enter;font-size:18px}#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10000;justify-content:center;align-items:center;backdrop-filter:blur(8px)}.modal-box{background:white;padding:28px;border-radius:28px;width:540px;max-width:92%;display:flex;flex-direction:column;gap:18px;box-shadow:0 30px 50px rgba(0,0,0,0.4);animation:slideIn 0.25s ease}@keyframes slideIn{from{transform:translateY(-30px);opacity:0}to{transform:translateY(0);opacity:1}}.modal-box h3{color:#1e293b;border-left:5px solid #667eea;padding-left:15px}.modal-box input,.modal-box select{padding:12px 15px;border:2px solid #e2e8f0;border-radius:16px;font-size:14px}.coord-row{display:flex;gap:10px;align-items:center}.coord-row button{width:48px;background:#f1f5f9;border:none;border-radius:14px;cursor:pointer;padding:10px}.image-preview-list{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}.image-item{position:relative;display:inline-block}.image-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #ddd;cursor:pointer}.image-item .delete-img-btn{position:absolute;top:-8px;right:-8px;background:#eb3349;color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}#actions{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}#actions button{flex:1;padding:12px;border-radius:40px;font-weight:bold;cursor:pointer;border:none;min-width:100px}#actions button:first-child{background:linear-gradient(135deg,#667eea,#764ba2);color:white}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:12px 28px;border-radius:60px;z-index:10001;animation:fadeInOut 3s ease;display:flex;align-items:center;gap:10px}.toast.success{background:linear-gradient(135deg,#11998e,#38ef7d)}.toast.error{background:linear-gradient(135deg,#eb3349,#f45c43)}@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) trans /* ===== STYLES LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 20000;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.lightbox.active {
  display: flex;
}
.lightbox img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
.lightbox .nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 40px;
  padding: 15px 20px;
  cursor: pointer;
  border-radius: 50%;
  width: 70px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}
.lightbox .nav-btn:hover {
  background: rgba(0,0,0,0.9);
}
.lightbox .prev {
  left: 20px;
}
.lightbox .next {
  right: 20px;
}
.lightbox .close-lightbox {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 20001;
}
.lightbox .counter {
  position: absolute;
  bottom: 20px;
  left: 0;
  right: 0;
  text-align: center;
  color: white;
  background: rgba(0,0,0,0.6);
  display: inline-block;
  width: auto;
  margin: 0 auto;
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 14px;
  pointer-events: none;
}
@media (max-width: 768px) {
  .lightbox .nav-btn {
    width: 40px;
    height: 40px;
    font-size: 24px;
    padding: 0;
  }
}

function showToast(msg, type = 'success') {
  const toast = document.createElement('div');

// ============ CONFIGURATION SUPABASE ============
const SUPABASE_URL = 'https://mtzebyldjggbgbupkudh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10emVieWxkamdnYmdidXBrdWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjUxNjIsImV4cCI6MjA5MDc0MTE2Mn0.9Gk2GuHtSKOff5PuIlTd_ZlUjLUPvO3R3g0vHjh6RKg';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TABLE_NAME = 'rooms';
const IMAGES_TABLE = 'room_images';
const STORAGE_BUCKET = 'room-images';

// === Fonctions de gestion des images (multiples) ===
async function uploadImage(file, roomId) {
  if (!file) return null;
  const ext = file.name.split('.').pop();
  const fileName = `${roomId}_${Date.now()}_${Math.random()}.${ext}`;
  const { data, error } = await supabaseClient.storage
    .from(STORAGE_BUCKET)
    .upload(fileName, file, {
      cacheControl: '3600',
      contentType: file.type
    });
  if (error) throw error;
  const { data: publicUrlData } = supabaseClient.storage
    .from(STORAGE_BUCKET)
    .getPublicUrl(fileName);
  return publicUrlData.publicUrl;
}

async function deleteImageFromStorage(imageUrl) {
  if (!imageUrl) return;
  const urlParts = imageUrl.split('/');
  const fileName = urlParts[urlParts.length - 1];
  if (fileName) {
    await supabaseClient.storage.from(STORAGE_BUCKET).remove([fileName]);
  }
}

async function addRoomImage(roomId, imageUrl) {
  const { error } = await supabaseClient.from(IMAGES_TABLE).insert({
    room_id: roomId,
    image_url: imageUrl
  });
  if (error) throw error;
}

async function getRoomImages(roomId) {
  const { data, error } = await supabaseClient
    .from(IMAGES_TABLE)
    .select('*')
    .eq('room_id', roomId)
    .order('id', { ascending: true });
  if (error) throw error;
  return data || [];
}

async function deleteRoomImage(imageId, imageUrl) {
  // Supprimer de la table
  const { error } = await supabaseClient.from(IMAGES_TABLE).delete().eq('id', imageId);
  if (error) throw error;
  // Supprimer du storage
  await deleteImageFromStorage(imageUrl);
}

async function deleteAllRoomImages(roomId) {
  const images = await getRoomImages(roomId);
  for (const img of images) {
    await deleteImageFromStorage(img.image_url);
  }
  const { error } = await supabaseClient.from(IMAGES_TABLE).delete().eq('room_id', roomId);
  if (error) throw error;
}

// === CRUD Rooms ===
async function getAllRooms() {
  const { data, error } = await supabaseClient
    .from(TABLE_NAME)
    .select('*')
    .order('id', { ascending: true });
  if (error) throw error;
  return data || [];
}

async function addRoom(room) {
  const { data, error } = await supabaseClient.from(TABLE_NAME).insert([room]).select();
  if (error) throw error;
  return data[0].id;
}

async function updateRoomInDB(room) {
  const { error } = await supabaseClient.from(TABLE_NAME).update({
    categorie: room.categorie, name: room.name, matricule: room.matricule,
    x: room.x, y: room.y, last_activity: room.last_activity
  }).eq('id', room.id);
  if (error) throw error;
}

async function deleteRoomById(id) {
  // Supprimer toutes les images liées (storage + DB)
  await deleteAllRoomImages(id);
  const { error } = await supabaseClient.from(TABLE_NAME).delete().eq('id', id);
  if (error) throw error;
}

async function isMatriculeUnique(matricule, excludeId = null) {
  let query = supabaseClient.from(TABLE_NAME).select('id').eq('matricule', matricule);
  if (excludeId) query = query.neq('id', excludeId);
  const { data, error } = await query;
  if (error) throw error;
  return data.length === 0;
}

async function initSampleData() {
  const { count, error: countError } = await supabaseClient.from(TABLE_NAME).select('*', { count: 'exact', head: true });
  if (countError) throw countError;
  if (count === 0) {

      { categorie: 'bureautique', name: 'Bureau', matricule: 'BUR-001', x: 500, y: 2000, last_activity: new Date().toLocaleString() },
      { categorie: 'salle à manger', name: 'Salle à Manger', matricule: 'SAM-001', x: 1000, y: 1000, last_activity: new Date().toLocaleString() },
      { categorie: 'rangement', name: 'Débarras', matricule: 'RAN-001', x: 800, y: 2200, last_activity: new Date().toLocaleString() },
      { categorie: 'chambre enfant', name: 'Chambre Enfant', matricule: 'ENF-001', x: 2200, y: 500, last_activity: new Date().toLocaleString() }
    ];
    const { error: insertError } = await supabaseClient.from(TABLE_NAME).insert(sampleRooms);
    if (insertError) throw insertError;
    showToast("Données de démonstration ajoutées", "success");
  }
}

// ============ FONCTIONS DE LA CARTE ============
function initMap() {
  map = L.map('map', { crs: L.CRS.Simple, minZoom: -1, zoomControl: false });
  let bounds = [[0, 0], [3000, 2669]];
  L.imageOverlay('floor1.jpg', bounds).addTo(map);
  map.fitBounds(bounds);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on("click", function(e) {
    let x = Math.round(e.latlng.lng);
    let y = Math.round(e.latlng.lat);
    if (picking === true) {
      pickedX = x; pickedY = y;
      document.getElementById("coord").value = x + "," + y;
      deactivatePickMode();
      document.getElementById("modal").style.display = "flex";
    }
  });
}

async function deleteFromPopup(roomId) {
  if (!confirm("هل أنت متأكد من حذف هذه الغرفة؟")) return;
  try {
    await deleteRoomById(roomId);
    showToast("تم حذف الغرفة بنجاح", "success");
    if (map) map.closePopup();
    await drawRooms();
  } catch(e) {
    showToast("خطأ في الحذف: " + e.message, "error");
  }
}

// Fonctions lightbox
function openLightboxFromList(imageUrls, startIndex) {
  if (!imageUrls || imageUrls.length === 0) return;
  currentGalleryImages = imageUrls;
  currentGalleryIndex = startIndex;
  updateLightboxImage();
  document.getElementById('lightbox').classList.add('active');
}

function updateLightboxImage() {
  const imgElement = document.getElementById('lightbox-img');
  const counter = document.getElementById('lightbox-counter');
  if (currentGalleryImages.length > 0) {
    imgElement.src = currentGalleryImages[currentGalleryIndex];
    counter.textContent = `${currentGalleryIndex+1} / ${currentGalleryImages.length}`;
  }
}

function nextImage() {
  if (currentGalleryImages.length === 0) return;
  currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryImages.length;
  updateLightboxImage();
}

function prevImage() {
  if (currentGalleryImages.length === 0) return;
  currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
  updateLightboxImage();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  currentGalleryImages = [];
}

function createPopupContent(room, catInfo, images) {
  let imagesHtml = '';
  if (images && images.length > 0) {
    // Créer un tableau des URLs
    const imageUrls = images.map(img => img.image_url);
    const displayImages = images.slice(0, 3);
    const moreCount = images.length - 3;
    imagesHtml = `<div style="display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap;">`;
    displayImages.forEach((img, idx) => {
      // Ajouter onclick pour ouvrir la galerie
      imagesHtml += `<img src="${img.image_url}" style="width:60px; height:60px; object-fit:cover; border-radius:6px; border:1px solid #ddd; cursor:pointer;" onclick="openLightboxFromList(${JSON.stringify(imageUrls)}, ${idx})">`;
    });
    if (moreCount > 0) {
      imagesHtml += `<div style="width:60px; height:60px; background:#eee; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer;" onclick="openLightboxFromList(${JSON.stringify(imageUrls)}, 3)">+${moreCount}</div>`;
    }
    imagesHtml += `</div>`;
  }
  return `<div style="min-width:200px;">
    ${imagesHtml}
    <div style="border-bottom:2px solid ${catInfo.color};color:${catInfo.color};display:flex;gap:8px;align-items:center;padding-bottom:6px;">
      <span>${catInfo.icon}</span>
      <strong>${escapeHtml(room.categorie || 'Sans catégorie')}</strong>
    </div>
    <div><i class="fas fa-door-open"></i> <strong>Nom:</strong> ${escapeHtml(room.name)}</div>
    <div><i class="fas fa-id-card"></i> <strong>Matricule:</strong> ${escapeHtml(room.matricule)}</div>
    <div><i class="fas fa-clock"></i> <strong>Activité:</strong> ${escapeHtml(room.last_activity || '')}</div>
    <hr style="margin:10px 0">
    <button class="edit-btn" data-id="${room.id}" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:40px;padding:8px;width:100%;cursor:pointer;margin-bottom:8px;">
      ✏️ Modifier
    </button>
    <button class="delete-popup-btn" data-id="${room.id}" style="background:linear-gradient(135deg,#eb3349,#f45c43);color:white;border:none;border-radius:40px;padding:8px;width:100%;cursor:pointer;">
      🗑️ Supprimer
    </button>
  </div>`;
}

async function drawRooms() {
  if (!map) return;
  currentMarkers.forEach(m => map.removeLayer(m));
  currentMarkers = [];
  const rooms = await getAllRooms();
  for (const room of rooms) {
    if (room.x && room.y) {
      const catInfo = CATEGORIES.find(c => c.value === room.categorie) || { icon: '📍', color: '#667eea' };
      const images = await getRoomImages(room.id);
      const marker = L.circle([room.y, room.x], {
        radius: 12,
        color: catInfo.color,
        fillColor: catInfo.color,
        fillOpacity: 0.8,
        weight: 3
      }).addTo(map);
      marker.bindPopup(createPopupContent(room, catInfo, images), { maxWidth: 260 });
      marker.on("click", () => { selectedRoom = room; });
      marker.on("popupopen", (e) => {
        const popup = e.popup.getElement();
        const editBtn = popup.querySelector(".edit-btn");
        if (editBtn) {
          editBtn.addEventListener("click", () => {
            const id = editBtn.getAttribute("data-id");
            editRoomById(id);
          });
        }
        const deleteBtn = popup.querySelector(".delete-popup-btn");
        if (deleteBtn) {
          deleteBtn.addEventListener("click", () => {
            const id = deleteBtn.getAttribute("data-id");
            deleteFromPopup(id);
          });
        }
      });
      currentMarkers.push(marker);
    }
  }
  updateStats();
  updateCategoriesList();
}

async function updateStats() {
  const rooms = await getAllRooms();
  const cats = new Set(rooms.map(r => r.categorie).filter(c => c));
  document.getElementById('roomCount').innerText = rooms.length;
  document.getElementById('categoryCount').innerText = cats.size;
}

let expandedCategories = new Set();

async function updateCategoriesList() {
  const rooms = await getAllRooms();
  const container = document.getElementById('categoriesList');
  if (!rooms.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;">Aucune salle</div>';
    return;
  }
  const byCat = new Map();
  rooms.forEach(room => {
    const cat = room.categorie || 'sans-categorie';
    if (!byCat.has(cat)) byCat.set(cat, []);
    byCat.get(cat).push(room);
  });
  const sortedCategories = Array.from(byCat.keys()).sort();
  let html = '';
  for (let cat of sortedCategories) {
    const roomsList = byCat.get(cat);
    const catInfo = CATEGORIES.find(c => c.value === cat) || { value: cat, label: cat, icon: '🏷️', color: '#9e9e9e' };
    const isExpanded = expandedCategories.has(cat);
    html += generateCatHTML(cat, catInfo.icon, catInfo.label, roomsList, isExpanded, cat === 'sans-categorie');
  }
  container.innerHTML = html;
  attachCategoryEvents();
}

function generateCatHTML(catValue, icon, label, roomsList, isExpanded, isUncategorized = false) {
  const expandedClass = isExpanded ? 'expanded' : '';
  const rotatedClass = isExpanded ? 'rotated' : '';
  const displayLabel = isUncategorized ? 'Sans catégorie' : label;
  const displayIcon = isUncategorized ? '📋' : icon;
  return `<div class="category-group" data-cat="${catValue}">
    <div class="category-header">
      <div class="category-name">
        <i class="fas ${isUncategorized ? 'fa-folder-open' : 'fa-folder'}"></i>
        <span>${displayIcon} ${escapeHtml(displayLabel)}</span>
        <span class="category-count">${roomsList.length}</span>
      </div>
      <i class="fas fa-chevron-right toggle-icon ${rotatedClass}"></i>
    </div>
    <div class="category-rooms ${expandedClass}">
      ${roomsList.map(room => `
        <div class="room-item" 
             data-room-id="${room.id}"
             data-room-x="${room.x}"
             data-room-y="${room.y}"
             data-room-name="${escapeHtml(room.name)}"
             data-room-mat="${escapeHtml(room.matricule)}">
          <div class="room-name"><i class="fas fa-door-open"></i> ${escapeHtml(room.name)}</div>
          <div class="room-mat">${escapeHtml(room.matricule)}</div>
          <div class="room-cat">${room.last_activity ? new Date(room.last_activity).toLocaleDateString() : ''}</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function attachRoomItemEvents() {
  document.querySelectorAll('.room-item').forEach(item => {
    item.removeEventListener('click', item._clickHandler);
    const handler = (e) => {
      e.stopPropagation();
      const roomId = parseInt(item.getAttribute('data-room-id'));
      const x = parseFloat(item.getAttribute('data-room-x'));
      const y = parseFloat(item.getAttribute('data-room-y'));
      const name = item.getAttribute('data-room-name');
      if (isNaN(x) || isNaN(y)) {
        showToast("Cette salle n'a pas de position valide", "error");
        return;
      }
      if (map) {
        map.flyTo([y, x], 2, { duration: 0.8 });
        setTimeout(() => {
          const marker = currentMarkers.find(m => {
            const latlng = m.getLatLng();
            return Math.abs(latlng.lat - y) < 5 && Math.abs(latlng.lng - x) < 5;
          });
          if (marker) marker.openPopup();
          showToast(`📍 ${name}`, 'success');
        }, 800);
      }
      selectedRoom = { id: roomId, x, y, name };
    };
    item.addEventListener('click', handler);
    item._clickHandler = handler;
  });
}

function attachCategoryEvents() {
  document.querySelectorAll('.category-group').forEach(group => {
    const header = group.querySelector('.category-header');
    if (!header) return;
    const newHeader = header.cloneNode(true);
    header.parentNode.replaceChild(newHeader, header);
    const finalHeader = newHeader;
    finalHeader.addEventListener('click', (e) => {
      const catValue = group.getAttribute('data-cat');
      const roomsDiv = group.querySelector('.category-rooms');
      const icon = finalHeader.querySelector('.toggle-icon');
      if (roomsDiv.classList.contains('expanded')) {
        roomsDiv.classList.remove('expanded');
        icon.classList.remove('rotated');
        expandedCategories.delete(catValue);
      } else {
        roomsDiv.classList.add('expanded');
        icon.classList.add('rotated');
        expandedCategories.add(catValue);
      }
      setTimeout(() => attachRoomItemEvents(), 50);
    });
  });
  attachRoomItemEvents();
}

function escapeHtml(t) { if(!t) return ''; return t.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// ============ GESTION DES IMAGES DANS LE MODAL (multiples) ============
function setupImageInput() {
  const input = document.getElementById('imageInput');
  input.onchange = (e) => {
    const files = Array.from(e.target.files);
    if (files.length) {
      currentImageFiles.push(...files);
      updateImagePreview();
    }
    input.value = ''; // pour permettre de ré-uploader les mêmes fichiers
  };
}

function updateImagePreview() {
  const container = document.getElementById('imagePreviewContainer');
  container.innerHTML = '';
  // Afficher les nouvelles images sélectionnées
  currentImageFiles.forEach((file, index) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const div = document.createElement('div');
      div.className = 'image-item';
      div.innerHTML = `
        <img src="${ev.target.result}" style="width:80px; height:80px; object-fit:cover; border-radius:8px;">
        <button type="button" class="delete-img-btn" data-index="${index}">🗑️</button>
      `;
      div.querySelector('.delete-img-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        currentImageFiles.splice(index, 1);
        updateImagePreview();
      });
      container.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
  // Afficher les images existantes (si en modification)
  if (existingImages.length > 0) {
    existingImages.forEach((img, idx) => {
      const div = document.createElement('div');
      div.className = 'image-item';
      div.innerHTML = `
        <img src="${img.image_url}" style="width:80px; height:80px; object-fit:cover; border-radius:8px;">
        <button type="button" class="delete-existing-img-btn" data-id="${img.id}" data-url="${img.image_url}">🗑️</button>
      `;
      div.querySelector('.delete-existing-img-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const imageId = parseInt(e.target.getAttribute('data-id'));
        const imageUrl = e.target.getAttribute('data-url');
        imagesToDelete.push({ id: imageId, url: imageUrl });
        existingImages = existingImages.filter(img => img.id !== imageId);
        updateImagePreview();
      });
      container.appendChild(div);
    });
  }
}

function clearImages() {
  currentImageFiles = [];
  existingImages = [];
  imagesToDelete = [];
  document.getElementById('imageInput').value = '';
  document.getElementById('imagePreviewContainer').innerHTML = '';
}

// ============ MODALES ============
function openModal(type) {
  deactivatePickMode();
  document.getElementById("modal").style.display = "flex";
  const actions = document.getElementById("actions");
  const title = document.getElementById("title");
  const now = new Date().toLocaleString();
  if (type === "add") {
    title.innerHTML = '<i class="fas fa-plus"></i> Ajouter une salle';
    actions.innerHTML = `<button onclick="saveRoom()"><i class="fas fa-save"></i> Enregistrer</button><button onclick="closeModal()">Annuler</button>`;
    document.getElementById("last_activity").value = now;
    selectedRoom = null; pickedX = null; pickedY = null;
    clearForm();
    clearImages();
  }
}

function validateFormFields() {
  if(!document.getElementById("categorie").value) { showToast("Choisissez une catégorie","error"); return false; }
  if(!document.getElementById("name").value.trim()) { showToast("Nom requis","error"); return false; }
  if(!document.getElementById("mat").value.trim()) { showToast("Matricule requis","error"); return false; }
  if(!document.getElementById("coord").value) { showToast("Position sur la carte requise","error"); return false; }
  return true;
}

async function saveRoom() {
  if(!validateFormFields()) return;
  if(pickedX === null || pickedY === null) {
    showToast("Sélectionnez un emplacement","error");
    return;
  }
  const newMat = document.getElementById("mat").value.trim();
  if(!await isMatriculeUnique(newMat)) {
    showToast("Matricule existe déjà","error");
    return;
  }
  const newRoom = {
    categorie: document.getElementById("categorie").value,
    name: document.getElementById("name").value.trim(),
    matricule: newMat,
    x: pickedX,
    y: pickedY,
    last_activity: new Date().toLocaleString()
  };
  try {
    const roomId = await addRoom(newRoom);
    // Upload de toutes les images sélectionnées
    for (const file of currentImageFiles) {
      const imageUrl = await uploadImage(file, roomId);
      await addRoomImage(roomId, imageUrl);
    }
    showToast("Salle ajoutée avec succès","success");
    closeModal();
    await drawRooms();
    clearForm();
    pickedX = null;
    pickedY = null;
    clearImages();
  } catch(e) {
    showToast("Erreur: " + e.message,"error");
  }
}

async function editRoomById(id) {
  const rooms = await getAllRooms();
  const room = rooms.find(r => String(r.id) === String(id));
  if (!room) {
    showToast("Salle non trouvée", "error");
    return;
  }
  selectedRoom = room;
  openEditModal();
}

async function openEditModal() {
  deactivatePickMode();
  if (!selectedRoom) {
    showToast("Erreur: aucune salle sélectionnée", "error");
    return;
  }
  fillForm(selectedRoom);
  // Charger les images existantes
  existingImages = await getRoomImages(selectedRoom.id);
  currentImageFiles = [];
  imagesToDelete = [];
  updateImagePreview();
  
  document.getElementById("modal").style.display = "flex";
  document.getElementById("title").innerHTML = '<i class="fas fa-edit"></i> Modifier la salle';
  document.getElementById("actions").innerHTML = `
    <button onclick="updateRoom()" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white">Mettre à jour</button>
    <button onclick="closeModal()">Annuler</button>
  `;
  pickedX = selectedRoom.x;
  pickedY = selectedRoom.y;
}

async function updateRoom() {
  if (!selectedRoom) return;
  if (!validateFormFields()) return;
  const newMat = document.getElementById("mat").value.trim();
  if (selectedRoom.matricule !== newMat && !await isMatriculeUnique(newMat, selectedRoom.id)) {
    showToast("Matricule déjà utilisé", "error");
    return;
  }
  selectedRoom.categorie = document.getElementById("categorie").value;
  selectedRoom.name = document.getElementById("name").value.trim();
  selectedRoom.matricule = newMat;
  if (pickedX !== null && pickedY !== null) {
    selectedRoom.x = pickedX;
    selectedRoom.y = pickedY;
  }
  selectedRoom.last_activity = new Date().toLocaleString();
  
  try {
    await updateRoomInDB(selectedRoom);
    
    // Supprimer les images marquées
    for (const img of imagesToDelete) {
      await deleteRoomImage(img.id, img.url);
    }
    // Ajouter les nouvelles images
    for (const file of currentImageFiles) {
      const imageUrl = await uploadImage(file, selectedRoom.id);
      await addRoomImage(selectedRoom.id, imageUrl);
    }
    
    showToast("Mise à jour réussie","success");
    closeModal();
    selectedRoom = null;
    await drawRooms();
  } catch(e) {
    showToast("Erreur: " + e.message,"error");
  }
}

function fillForm(room) {
  if (!room) return;
  document.getElementById("categorie").value = room.categorie || "";
  document.getElementById("name").value = room.name || "";
  document.getElementById("mat").value = room.matricule || "";
  document.getElementById("coord").value = (room.x && room.y) ? room.x + "," + room.y : "";
  document.getElementById("last_activity").value = room.last_activity || "";
  pickedX = room.x;
  pickedY = room.y;
}

function clearForm() {
  document.getElementById("categorie").value = "";
  document.getElementById("name").value = "";
  document.getElementById("mat").value = "";
  document.getElementById("coord").value = "";
  document.getElementById("last_activity").value = "";
}

function closeModal() { 
  document.getElementById("modal").style.display="none"; 
  deactivatePickMode(); 
  pickedX=null; pickedY=null;
  clearImages();
}
function startPick() { closeModal(); activatePickMode(); showToast("Cliquez sur la carte", "success"); }
function activatePickMode() { picking=true; document.getElementById('map').classList.add('picking-mode'); const lc=document.querySelector('.leaflet-container'); if(lc) lc.style.cursor='crosshair'; }
function deactivatePickMode() { picking=false; document.getElementById('map').classList.remove('picking-mode'); const lc=document.querySelector('.leaflet-container'); if(lc) lc.style.cursor=''; }
function togglePanel() { const panel=document.getElementById('sidePanel'); const showBtn=document.getElementById('showPanelBtn'); panel.classList.toggle('collapsed'); const icon=panel.querySelector('.toggle-panel i'); if(panel.classList.contains('collapsed')) { icon.classList.remove('fa-chevron-left'); icon.classList.add('fa-chevron-right'); showBtn.style.display='flex'; } else { icon.classList.remove('fa-chevron-right'); icon.classList.add('fa-chevron-left'); showBtn.style.display='none'; } }
function showPanel() { const panel=document.getElementById('sidePanel'); panel.classList.remove('collapsed'); const icon=panel.querySelector('.toggle-panel i'); icon.classList.remove('fa-chevron-right'); icon.classList.add('fa-chevron-left'); document.getElementById('showPanelBtn').style.display='none'; }

// ============ ÉVÉNEMENTS ============
document.getElementById("loginBtn").addEventListener("click", () => { showToast("🔐 Connexion en mode invité (démo)", "success"); });
document.getElementById("search").addEventListener("input", async (e) => {
  const val = e.target.value.toLowerCase().trim();
  if(val === "") return;
  const rooms = await getAllRooms();
  const found = rooms.find(r => (r.name && r.name.toLowerCase().includes(val)) || (r.matricule && r.matricule.toLowerCase().includes(val)) || (r.categorie && r.categorie.toLowerCase().includes(val)));
  if(found) { map.setView([found.y, found.x], 2); const marker = currentMarkers.find(m => { const ll=m.getLatLng(); return Math.abs(ll.lat-found.y)<1 && Math.abs(ll.lng-found.x)<1; }); if(marker) marker.openPopup(); showToast(`Trouvé: ${found.name}`,"success"); } else { showToast("Aucune salle","error"); }
});

// ============ INITIALISATION ============
(async function init() {
  supabaseClient
    .channel('rooms-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_NAME }, async () => { await drawRooms(); })
    .subscribe();
  supabaseClient
    .channel('images-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: IMAGES_TABLE }, async () => { await drawRooms(); })
    .subscribe();
  try {
    await initSampleData();
    initMap();
    setupImageInput();
    await drawRooms();
    showToast("Système prêt - Support multi-images avec galerie", "success");
    
    // Écouteurs pour la lightbox
    const lightbox = document.getElementById('lightbox');
    const closeBtn = lightbox.querySelector('.close-lightbox');
    const prevBtn = lightbox.querySelector('.prev');
    const nextBtn = lightbox.querySelector('.next');
    
    closeBtn.addEventListener('click', closeLightbox);
    prevBtn.addEventListener('click', prevImage);
    nextBtn.addEventListener('click', nextImage);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    // navigation clavier
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'Escape') closeLightbox();
    });
  } catch (error) {
    console.error(error);
    showToast("Erreur de connexion", "error");
  }
})();
</script>
