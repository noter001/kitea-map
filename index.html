<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Indoor Map - Gestion des salles</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
/* جميع الأنماط كما في الرد السابق (تم حذفها للاختصار ولكن موجودة في الكود الكامل) */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fb}
#map{height:100vh;width:100%;cursor:default}
@media (max-width:768px){
  .top-toolbar{position:absolute;top:12px;left:12px;right:12px;z-index:1100;display:flex;flex-direction:column;gap:10px}
  .first-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);border-radius:50px;padding:6px 16px;gap:12px;flex-wrap:wrap}
  .left-group{display:flex;align-items:center;gap:10px}
  .btn-login,.user-info{background:linear-gradient(135deg,#b30000,#800000);color:white;border:none;padding:8px 16px;border-radius:40px;font-weight:bold;font-size:13px}
  #floorSelectBox{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:30px;padding:6px 12px}
  .stats-mobile{display:flex;gap:12px;background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:40px;color:white;font-size:12px}
  .search-box{background:white;border-radius:50px;padding:10px 18px;display:flex;align-items:center;gap:12px;width:100%}
  .action-group-right{position:absolute;bottom:20px;right:16px;z-index:1100;display:flex;flex-direction:column;gap:12px}
  .action-btn{background:linear-gradient(135deg,#ff4d4d,#cc0000);color:white;border:none;padding:12px 20px;border-radius:50px;font-weight:bold}
  .side-panel{position:absolute;left:12px;top:140px;bottom:20px;width:85%;max-width:300px;background:white;border-radius:24px;z-index:900;display:flex;flex-direction:column;overflow:hidden}
  .categories-list{flex:1;overflow-y:auto;padding:12px}
  .category-rooms.expanded{max-height:300px;overflow-y:auto}
  .stats-bar.desktop-only{display:none}
}
@media (min-width:769px){
  .top-toolbar{position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center;z-index:1000}
  .first-row{display:flex;align-items:center;gap:15px;background:rgba(255,255,255,0.95);padding:5px 20px;border-radius:50px}
  .stats-mobile{display:none}
  .action-group-right{position:absolute;top:100px;right:20px}
  .side-panel{left:20px;top:95px;bottom:20px;width:320px}
}
.custom-extent-control{background:white;width:34px;height:34px;line-height:34px;text-align:center;border-radius:4px;box-shadow:0 1px 5px rgba(0,0,0,0.4);cursor:pointer;margin-bottom:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 24px;border-radius:60px;z-index:10001;font-size:13px}
.modal-login,.modal-user-management,#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:10000;justify-content:center;align-items:center}
.modal-box{background:white;border-radius:28px;padding:24px;width:500px;max-width:92%}
.coord-row{display:flex;gap:10px}
</style>
</head>
<body>
<div class="top-toolbar">
  <div class="first-row">
    <div class="left-group">
      <button class="btn-login" id="loginBtn"><i class="fas fa-user-circle"></i> Login</button>
      <div id="userInfo" style="display:none;" class="user-info">
        <i class="fas fa-user-check"></i> <span id="userName"></span> (<span id="userRole"></span>)
        <button id="logoutBtn" style="background:#555; border:none; color:white; border-radius:20px; padding:2px 8px; margin-left:6px;">Logout</button>
      </div>
      <select id="floorSelectBox"><option value="1">🏢 1er étage</option><option value="rdc">🏢 RDC</option></select>
    </div>
    <div class="stats-mobile"><i class="fas fa-door-open"></i> <span id="mobileRoomCount">0</span> &nbsp;|&nbsp; <i class="fas fa-tags"></i> <span id="mobileCategoryCount">0</span></div>
  </div>
  <div class="search-box"><i class="fas fa-search"></i><input id="search" placeholder="Rechercher nom, matricule..."></div>
</div>
<div class="stats-bar desktop-only"><i class="fas fa-building"></i> Salles: <span id="roomCount">0</span> <i class="fas fa-tags"></i> Catégories: <span id="categoryCount">0</span></div>
<div class="action-group-right" id="adminActions" style="display:none;">
  <button class="action-btn" onclick="openModal('add')"><i class="fas fa-plus-circle"></i> Ajouter</button>
  <button class="action-btn secondary" id="manageUsersBtn" style="display:none;" onclick="openUserManagement()"><i class="fas fa-users-cog"></i> Gérer</button>
</div>
<div class="side-panel" id="sidePanel">
  <div class="panel-header" style="background:linear-gradient(135deg,#ff4d4d,#cc0000);color:white;padding:14px 18px;display:flex;justify-content:space-between">
    <span><i class="fas fa-folder-tree"></i> Catégories</span>
    <button class="toggle-panel" onclick="togglePanel()" style="background:none;border:none;color:white"><i class="fas fa-chevron-left"></i></button>
  </div>
  <div class="categories-list" id="categoriesList"></div>
</div>
<button class="show-panel-btn" id="showPanelBtn" onclick="showPanel()" style="display:none; position:absolute; left:12px; top:160px; width:38px; height:48px; background:linear-gradient(135deg,#ff4d4d,#cc0000); border:none; border-radius:0 20px 20px 0; color:white;">➡</button>
<div id="map"></div>

<!-- Modals -->
<div id="modal"><div class="modal-box"><h3 id="title">Action</h3><select id="categorie"><option value="">-- Catégorie --</option><option value="salon et séjour">🏠 Salon</option><option value="salle à manger">🍽️ Salle à manger</option><option value="chambre adulte">🛏️ Chambre adulte</option><option value="chambre enfant">🧸 Chambre enfant</option><option value="rangement">📦 Rangement</option><option value="bureautique">💼 Bureautique</option><option value="jardin">🌳 Jardin</option><option value="accessoire">🔧 Accessoire</option></select><input id="name" placeholder="Nom *"><input id="mat" placeholder="Matricule *"><div class="coord-row"><input id="coord" placeholder="Coordonnées X,Y" readonly><button onclick="startPick()"><i class="fas fa-crosshairs"></i></button></div><div><label>Images</label><input type="file" id="imageInput" accept="image/*" multiple><div id="imagePreviewContainer" class="image-preview-list"></div></div><input id="last_activity" readonly><div id="actions"></div></div></div>
<div id="lightbox" class="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:20000; justify-content:center; align-items:center;"><button class="close-lightbox" style="position:absolute; top:20px; right:30px; background:none; border:none; color:white; font-size:30px;">✕</button><button class="nav-btn prev" style="position:absolute; left:20px; top:50%; background:rgba(0,0,0,0.6); color:white; border:none; font-size:30px; padding:10px 15px;">‹</button><img id="lightbox-img" style="max-width:90%; max-height:90%;"><button class="nav-btn next" style="position:absolute; right:20px; top:50%; background:rgba(0,0,0,0.6); color:white; border:none; font-size:30px; padding:10px 15px;">›</button><div class="counter" style="position:absolute; bottom:20px; color:white;"></div></div>
<div id="loginModal" class="modal-login"><div class="modal-box"><h3>Connexion</h3><input id="loginUsername" placeholder="Nom d'utilisateur"><input id="loginPassword" type="password" placeholder="Mot de passe"><button id="doLoginBtn">Se connecter</button><div id="loginError" class="error-msg"></div></div></div>
<div id="userMgmtModal" class="modal-user-management"><div class="modal-box"><h3>Gestion utilisateurs</h3><div id="userList" class="user-list" style="max-height:200px; overflow-y:auto;"></div><input id="newUsername" placeholder="Nom"><input id="newPassword" type="password" placeholder="Mot de passe"><select id="newUserRole"><option value="user">Utilisateur</option><option value="admin">Admin</option></select><button id="createUserBtn">Créer</button><button onclick="closeUserManagement()" style="background:#666;">Fermer</button><div id="userMgmtError" class="error-msg"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============ ÉVITER LE CONFLIT AVEC window.supabase ============
const supabaseClient = window.supabase.createClient(
  'https://mtzebyldjggbgbupkudh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10emVieWxkamdnYmdidXBrdWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjUxNjIsImV4cCI6MjA5MDc0MTE2Mn0.9Gk2GuHtSKOff5PuIlTd_ZlUjLUPvO3R3g0vHjh6RKg'
);

let currentSession = null, map = null, picking = false, pickedX = null, pickedY = null, selectedRoom = null;
let currentMarkers = [], currentImageFiles = [], existingImages = [], imagesToDelete = [];
let currentGalleryImages = [], currentGalleryIndex = 0, currentFloor = '1';
let expandedCategories = new Set();

const CATEGORIES = [
  { value: 'salon et séjour', label: 'Salon', icon: '🏠', color: '#ff4d4d' },
  { value: 'salle à manger', label: 'Salle à manger', icon: '🍽️', color: '#4caf50' },
  { value: 'chambre adulte', label: 'Chambre adulte', icon: '🛏️', color: '#ff9800' },
  { value: 'chambre enfant', label: 'Chambre enfant', icon: '🧸', color: '#e91e63' },
  { value: 'rangement', label: 'Rangement', icon: '📦', color: '#607d8b' },
  { value: 'bureautique', label: 'Bureautique', icon: '💼', color: '#3f51b5' },
  { value: 'jardin', label: 'Jardin', icon: '🌳', color: '#8bc34a' },
  { value: 'accessoire', label: 'Accessoire', icon: '🔧', color: '#9e9e9e' }
];

// ============ FONCTIONS AUTH ============
async function login(username, password) {
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email: username+'@app.local', password });
  if (error) throw error;
  const { data: profile } = await supabaseClient.from('profiles').select('username,role').eq('id', data.user.id).single();
  if (!profile) throw new Error('Profil introuvable');
  return { user: data.user, username: profile.username, role: profile.role };
}
async function logout() { await supabaseClient.auth.signOut(); currentSession = null; updateUI(); drawRooms(); }
async function loadSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { currentSession = null; updateUI(); return; }
  const { data: profile } = await supabaseClient.from('profiles').select('username,role').eq('id', session.user.id).single();
  currentSession = profile ? { user: session.user, username: profile.username, role: profile.role } : null;
  updateUI();
}
function updateUI() {
  const loginBtn = document.getElementById('loginBtn'), userDiv = document.getElementById('userInfo');
  const adminDiv = document.getElementById('adminActions'), manageBtn = document.getElementById('manageUsersBtn');
  if (currentSession) {
    loginBtn.style.display = 'none'; userDiv.style.display = 'flex';
    document.getElementById('userName').innerText = currentSession.username;
    document.getElementById('userRole').innerText = currentSession.role === 'admin' ? 'Admin' : 'User';
    adminDiv.style.display = 'flex'; manageBtn.style.display = currentSession.role === 'admin' ? 'flex' : 'none';
  } else {
    loginBtn.style.display = 'flex'; userDiv.style.display = 'none'; adminDiv.style.display = 'none';
  }
  drawRooms();
}

// ============ USER MANAGEMENT ============
async function openUserManagement() { if (currentSession?.role === 'admin') { document.getElementById('userMgmtModal').style.display = 'flex'; await refreshUserList(); } }
function closeUserManagement() { document.getElementById('userMgmtModal').style.display = 'none'; }
async function refreshUserList() {
  const { data } = await supabaseClient.from('profiles').select('id,username,role');
  const container = document.getElementById('userList'); container.innerHTML = '';
  for (const u of data) {
    const div = document.createElement('div');
    div.innerHTML = `<strong>${escapeHtml(u.username)}</strong> (${u.role})`;
    if (u.username !== currentSession?.username) {
      const btn = document.createElement('button'); btn.textContent = 'Supprimer';
      btn.onclick = async () => { await supabaseClient.rpc('delete_user_by_username', { username_to_delete: u.username }); await refreshUserList(); showToast('Supprimé','success'); };
      div.appendChild(btn);
    }
    container.appendChild(div);
  }
}
async function createNewUser() {
  const username = document.getElementById('newUsername').value.trim();
  const pwd = document.getElementById('newPassword').value.trim();
  const role = document.getElementById('newUserRole').value;
  if (!username || !pwd) { document.getElementById('userMgmtError').innerText = 'Champs requis'; return; }
  try {
    const { data, error } = await supabaseClient.auth.signUp({ email: username+'@app.local', password: pwd, options: { data: { username } } });
    if (error) throw error;
    await supabaseClient.from('profiles').insert({ id: data.user.id, username, role });
    showToast('Utilisateur créé','success');
    document.getElementById('newUsername').value = ''; document.getElementById('newPassword').value = '';
    await refreshUserList();
  } catch(e) { document.getElementById('userMgmtError').innerText = e.message; }
}

// ============ MAP ============
function initMap() {
  map = L.map('map', { crs: L.CRS.Simple, minZoom: -1, zoomControl: false });
  const bounds = [[0,0],[3000,2669]];
  // Grille de secours
  const grid = L.layerGroup();
  for (let i=0; i<=3000; i+=500) {
    L.polyline([[i,0],[i,2669]], { color:'#ccc', weight:0.5 }).addTo(grid);
    L.polyline([[0,i],[3000,i]], { color:'#ccc', weight:0.5 }).addTo(grid);
  }
  grid.addTo(map);
  map.overlay = grid;
  map.fitBounds(bounds);
  
  function loadImage(floor) {
    const url = floor === '1' ? 'floor1.jpg' : 'floor_rdc.jpg';
    const img = new Image();
    img.onload = () => {
      if (map.overlay) map.removeLayer(map.overlay);
      const overlay = L.imageOverlay(url, bounds).addTo(map);
      map.overlay = overlay;
    };
    img.onerror = () => {};
    img.src = url;
  }
  loadImage(currentFloor);
  
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  const ExtentCtrl = L.Control.extend({ options: { position: 'bottomright' }, onAdd: () => { const div = L.DomUtil.create('div','custom-extent-control'); div.innerHTML = '<i class="fas fa-expand-alt"></i>'; div.onclick = () => map.fitBounds(bounds); return div; } });
  map.addControl(new ExtentCtrl());
  map.on('click', e => { if(picking) { pickedX = Math.round(e.latlng.lng); pickedY = Math.round(e.latlng.lat); document.getElementById('coord').value = pickedX+','+pickedY; deactivatePickMode(); document.getElementById('modal').style.display='flex'; } });
}
async function changeFloor(floor) { currentFloor = floor; localStorage.setItem('selectedFloor',floor); updateMapFloor(floor); await drawRooms(); document.getElementById('floorSelectBox').value = floor; showToast(`Étage changé`,'success'); }
function updateMapFloor(floor) {
  if (!map) return;
  const bounds = [[0,0],[3000,2669]];
  const url = floor === '1' ? 'floor1.jpg' : 'floor_rdc.jpg';
  const img = new Image();
  img.onload = () => {
    if (map.overlay) map.removeLayer(map.overlay);
    const overlay = L.imageOverlay(url, bounds).addTo(map);
    map.overlay = overlay;
  };
  img.onerror = () => {
    if (map.overlay) map.removeLayer(map.overlay);
    const grid = L.layerGroup();
    for (let i=0; i<=3000; i+=500) { L.polyline([[i,0],[i,2669]], {color:'#ccc',weight:0.5}).addTo(grid); L.polyline([[0,i],[3000,i]], {color:'#ccc',weight:0.5}).addTo(grid); }
    grid.addTo(map);
    map.overlay = grid;
  };
  img.src = url;
}

// ============ CRUD ROOMS ============
async function getAllRooms(floor=currentFloor) { const { data } = await supabaseClient.from('rooms').select('*').eq('floor',floor); return data || []; }
async function addRoom(room) { const { data } = await supabaseClient.from('rooms').insert([room]).select(); return data[0].id; }
async function updateRoomInDB(room) { await supabaseClient.from('rooms').update(room).eq('id',room.id); }
async function deleteRoomById(id) { await deleteAllRoomImages(id); await supabaseClient.from('rooms').delete().eq('id',id); }
async function isMatriculeUnique(mat, floor, exclude=null) { let q = supabaseClient.from('rooms').select('id').eq('matricule',mat).eq('floor',floor); if(exclude) q = q.neq('id',exclude); const { data } = await q; return data.length === 0; }
async function uploadImage(file, roomId) { const ext = file.name.split('.').pop(); const name = `${roomId}_${Date.now()}_${Math.random()}.${ext}`; await supabaseClient.storage.from('room-images').upload(name, file); const { data } = supabaseClient.storage.from('room-images').getPublicUrl(name); return data.publicUrl; }
async function addRoomImage(roomId, url) { await supabaseClient.from('room_images').insert({ room_id: roomId, image_url: url }); }
async function getRoomImages(roomId) { const { data } = await supabaseClient.from('room_images').select('*').eq('room_id',roomId); return data || []; }
async function deleteRoomImage(id, url) { await supabaseClient.from('room_images').delete().eq('id',id); const fn = url.split('/').pop(); if(fn) await supabaseClient.storage.from('room-images').remove([fn]); }
async function deleteAllRoomImages(roomId) { const imgs = await getRoomImages(roomId); for(const img of imgs) await deleteRoomImage(img.id, img.image_url); }
async function initSampleData() { const { count } = await supabaseClient.from('rooms').select('*',{count:'exact',head:true}); if(count===0){ await supabaseClient.from('rooms').insert([ {categorie:'salon et séjour',name:'Salon Principal',matricule:'SAL-001',x:1334,y:1500,last_activity:new Date().toLocaleString(),floor:'1'}, {categorie:'chambre adulte',name:'Chambre Master',matricule:'CHM-001',x:2000,y:800,last_activity:new Date().toLocaleString(),floor:'1'}, {categorie:'bureautique',name:'Bureau',matricule:'BUR-001',x:500,y:2000,last_activity:new Date().toLocaleString(),floor:'1'} ]); showToast('Données démo ajoutées','success'); } }

// ============ AFFICHAGE ============
async function drawRooms() {
  if(!map) return;
  currentMarkers.forEach(m=>map.removeLayer(m)); currentMarkers=[];
  const rooms = await getAllRooms();
  for(const room of rooms){
    const cat = CATEGORIES.find(c=>c.value===room.categorie)||{icon:'📍',color:'#ff4d4d'};
    const images = await getRoomImages(room.id);
    const marker = L.circle([room.y,room.x], { radius:12, color:cat.color, fillColor:cat.color, fillOpacity:0.8 }).addTo(map);
    marker.bindPopup(createPopup(room,cat,images));
    marker.on('popupopen', e => { const el = e.popup.getElement(); el.querySelectorAll('.popup-gallery-img, .popup-gallery-more').forEach(img=>{ img.onclick = (ev)=>{ ev.stopPropagation(); const urls=JSON.parse(img.getAttribute('data-urls')); const idx=parseInt(img.getAttribute('data-idx')); openLightbox(urls,idx); }; }); if(currentSession){ el.querySelector('.edit-btn')?.addEventListener('click',()=>editRoomById(room.id)); el.querySelector('.delete-popup-btn')?.addEventListener('click',()=>deleteFromPopup(room.id)); } });
    currentMarkers.push(marker);
  }
  updateStats(rooms);
  updateCategoriesList(rooms);
}
function createPopup(room, cat, images){
  let imgsHtml = '';
  if(images.length){
    const urls = images.map(i=>i.image_url);
    const first = images.slice(0,3);
    imgsHtml = `<div style="display:flex;gap:5px;margin-bottom:8px;">`;
    first.forEach((img,i)=>{ imgsHtml+=`<img src="${img.image_url}" class="popup-gallery-img" data-urls='${JSON.stringify(urls)}' data-idx="${i}" style="width:55px;height:55px;border-radius:6px;cursor:pointer;">`; });
    if(images.length>3) imgsHtml+=`<div class="popup-gallery-more" data-urls='${JSON.stringify(urls)}' data-idx="3" style="width:55px;height:55px;background:#eee;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;">+${images.length-3}</div>`;
    imgsHtml+=`</div>`;
  }
  let btns=''; if(currentSession) btns=`<hr><button class="edit-btn" style="background:#ff4d4d;color:white;border:none;border-radius:40px;padding:8px;width:100%;margin:5px 0;">✏️ Modifier</button><button class="delete-popup-btn" style="background:#eb3349;color:white;border:none;border-radius:40px;padding:8px;width:100%;">🗑️ Supprimer</button>`;
  return `<div>${imgsHtml}<div style="border-bottom:2px solid ${cat.color}"><span>${cat.icon}</span> <strong>${escapeHtml(room.categorie)}</strong></div><div><strong>${escapeHtml(room.name)}</strong> (${escapeHtml(room.matricule)})</div><div><i class="fas fa-clock"></i> ${escapeHtml(room.last_activity||'')}</div>${btns}</div>`;
}
function updateStats(rooms){
  const count = rooms.length, cats = new Set(rooms.map(r=>r.categorie)).size;
  document.getElementById('roomCount').innerText = count; document.getElementById('categoryCount').innerText = cats;
  document.getElementById('mobileRoomCount').innerText = count; document.getElementById('mobileCategoryCount').innerText = cats;
}
function updateCategoriesList(rooms){
  const container = document.getElementById('categoriesList');
  if(!rooms.length){ container.innerHTML='<div style="padding:20px;text-align:center;">Aucune salle</div>'; return; }
  const byCat = new Map();
  rooms.forEach(r=>{ const cat=r.categorie||'sans'; if(!byCat.has(cat)) byCat.set(cat,[]); byCat.get(cat).push(r); });
  let html='';
  for(let [cat,list] of byCat){
    const info = CATEGORIES.find(c=>c.value===cat)||{icon:'📁',label:cat};
    const expanded = expandedCategories.has(cat);
    html+=`<div class="category-group" data-cat="${cat}"><div class="category-header" style="display:flex;justify-content:space-between;padding:10px;background:#f0f0f0;cursor:pointer"><span>${info.icon} ${escapeHtml(info.label)} <span class="category-count" style="background:#ff4d4d;color:white;padding:2px 8px;border-radius:20px;margin-left:8px;">${list.length}</span></span><i class="fas fa-chevron-right toggle-icon ${expanded?'rotated':''}" style="transition:transform 0.2s;"></i></div><div class="category-rooms ${expanded?'expanded':''}" style="max-height:0;overflow:hidden;transition:max-height 0.3s;">${list.map(room=>`<div class="room-item" data-x="${room.x}" data-y="${room.y}" data-name="${escapeHtml(room.name)}" style="padding:12px;margin:8px;background:white;border-radius:12px;border-left:3px solid #ff4d4d;cursor:pointer;"><div class="room-name">${escapeHtml(room.name)}</div><div class="room-mat">${escapeHtml(room.matricule)}</div></div>`).join('')}</div></div>`;
  }
  container.innerHTML = html;
  attachCategoryEvents();
}
function attachCategoryEvents(){
  document.querySelectorAll('.category-group').forEach(g=>{
    const header = g.querySelector('.category-header');
    const newH = header.cloneNode(true);
    header.parentNode.replaceChild(newH, header);
    newH.addEventListener('click',()=>{
      const cat=g.getAttribute('data-cat');
      const roomsDiv=g.querySelector('.category-rooms');
      const icon=newH.querySelector('.toggle-icon');
      if(roomsDiv.classList.contains('expanded')){ roomsDiv.classList.remove('expanded'); roomsDiv.style.maxHeight='0'; icon.classList.remove('rotated'); expandedCategories.delete(cat); }
      else{ roomsDiv.classList.add('expanded'); roomsDiv.style.maxHeight='300px'; icon.classList.add('rotated'); expandedCategories.add(cat); }
      attachRoomItemEvents();
    });
  });
  attachRoomItemEvents();
}
function attachRoomItemEvents(){
  document.querySelectorAll('.room-item').forEach(item=>{
    const handler = ()=>{
      const x = parseFloat(item.getAttribute('data-x')), y = parseFloat(item.getAttribute('data-y'));
      if(!isNaN(x)&&!isNaN(y)){ map.flyTo([y,x],2,{duration:0.7}); setTimeout(()=>{ const m=currentMarkers.find(mk=>Math.abs(mk.getLatLng().lat-y)<5&&Math.abs(mk.getLatLng().lng-x)<5); if(m) m.openPopup(); showToast(item.getAttribute('data-name'),'success'); },700); }
    };
    item.removeEventListener('click', item._handler);
    item.addEventListener('click', handler);
    item._handler = handler;
  });
}
async function deleteFromPopup(id){ if(!currentSession) return; if(confirm('Supprimer ?')){ await deleteRoomById(id); showToast('Supprimée','success'); map.closePopup(); await drawRooms(); } }
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function showToast(msg,type='success'){ const old=document.querySelector('.toast'); if(old) old.remove(); const t=document.createElement('div'); t.className=`toast ${type}`; t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

// ============ IMAGES MODAL ============
function setupImageInput(){ document.getElementById('imageInput').onchange=e=>{ const files=Array.from(e.target.files); if(files.length){ currentImageFiles.push(...files); updateImagePreview(); } e.target.value=''; }; }
function updateImagePreview(){
  const container=document.getElementById('imagePreviewContainer'); container.innerHTML='';
  currentImageFiles.forEach((f,idx)=>{ const reader=new FileReader(); reader.onload=ev=>{ const div=document.createElement('div'); div.className='image-item'; div.innerHTML=`<img src="${ev.target.result}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;"><button class="delete-img-btn" data-idx="${idx}" style="position:absolute; top:-8px; right:-8px; background:#eb3349; color:white; border:none; border-radius:50%; width:22px; height:22px;">🗑️</button>`; div.querySelector('.delete-img-btn').onclick=()=>{ currentImageFiles.splice(idx,1); updateImagePreview(); }; container.appendChild(div); }; reader.readAsDataURL(f); });
  existingImages.forEach(img=>{ const div=document.createElement('div'); div.className='image-item'; div.style.position='relative'; div.innerHTML=`<img src="${img.image_url}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;"><button class="delete-existing-img-btn" data-id="${img.id}" data-url="${img.image_url}" style="position:absolute; top:-8px; right:-8px; background:#eb3349; color:white; border:none; border-radius:50%; width:22px; height:22px;">🗑️</button>`; div.querySelector('.delete-existing-img-btn').onclick=()=>{ imagesToDelete.push({id:img.id,url:img.image_url}); existingImages=existingImages.filter(i=>i.id!==img.id); updateImagePreview(); }; container.appendChild(div); });
}
function clearImages(){ currentImageFiles=[]; existingImages=[]; imagesToDelete=[]; document.getElementById('imageInput').value=''; document.getElementById('imagePreviewContainer').innerHTML=''; }
function openModal(type){
  if(!currentSession){ showToast('Connectez-vous','error'); return; }
  deactivatePickMode();
  document.getElementById('modal').style.display='flex';
  if(!document.getElementById('floorSelect')){
    const coordRow=document.querySelector('.coord-row');
    const div=document.createElement('div'); div.innerHTML=`<label>Étage</label><select id="floorSelect"><option value="1">1er</option><option value="rdc">RDC</option></select>`;
    coordRow.parentNode.insertBefore(div,coordRow);
  }
  if(type==='add'){
    document.getElementById('title').innerHTML='<i class="fas fa-plus"></i> Ajouter';
    document.getElementById('actions').innerHTML=`<button onclick="saveRoom()">Enregistrer</button><button onclick="closeModal()">Annuler</button>`;
    document.getElementById('last_activity').value=new Date().toLocaleString();
    selectedRoom=null; pickedX=pickedY=null; clearForm(); clearImages();
    document.getElementById('floorSelect').value=currentFloor;
  }
}
function validateForm(){ if(!document.getElementById('categorie').value){ showToast('Catégorie requise','error'); return false; } if(!document.getElementById('name').value.trim()){ showToast('Nom requis','error'); return false; } if(!document.getElementById('mat').value.trim()){ showToast('Matricule requis','error'); return false; } if(!document.getElementById('coord').value){ showToast('Position requise','error'); return false; } return true; }
async function saveRoom(){
  if(!validateForm()) return;
  if(pickedX===null||pickedY===null){ showToast('Cliquez sur la carte','error'); return; }
  const mat=document.getElementById('mat').value.trim(), floor=document.getElementById('floorSelect').value;
  if(!await isMatriculeUnique(mat,floor)){ showToast('Matricule existe déjà','error'); return; }
  const newRoom={ categorie:document.getElementById('categorie').value, name:document.getElementById('name').value.trim(), matricule:mat, x:pickedX, y:pickedY, last_activity:new Date().toLocaleString(), floor };
  const roomId=await addRoom(newRoom);
  for(const f of currentImageFiles){ const url=await uploadImage(f,roomId); await addRoomImage(roomId,url); }
  showToast('Ajoutée','success'); closeModal(); await drawRooms(); clearForm(); pickedX=pickedY=null; clearImages();
}
async function editRoomById(id){ if(!currentSession) return; const {data:room}=await supabaseClient.from('rooms').select('*').eq('id',id).single(); if(room){ selectedRoom=room; openEditModal(); } }
async function openEditModal(){
  deactivatePickMode(); if(!selectedRoom) return;
  fillForm(selectedRoom);
  existingImages=await getRoomImages(selectedRoom.id); currentImageFiles=[]; imagesToDelete=[]; updateImagePreview();
  if(!document.getElementById('floorSelect')){ const coordRow=document.querySelector('.coord-row'); const div=document.createElement('div'); div.innerHTML=`<label>Étage</label><select id="floorSelect"><option value="1">1er</option><option value="rdc">RDC</option></select>`; coordRow.parentNode.insertBefore(div,coordRow); }
  document.getElementById('floorSelect').value=selectedRoom.floor||'1';
  document.getElementById('modal').style.display='flex';
  document.getElementById('title').innerHTML='<i class="fas fa-edit"></i> Modifier';
  document.getElementById('actions').innerHTML=`<button onclick="updateRoom()">Mettre à jour</button><button onclick="closeModal()">Annuler</button>`;
  pickedX=selectedRoom.x; pickedY=selectedRoom.y;
}
async function updateRoom(){
  if(!selectedRoom||!validateForm()) return;
  const newMat=document.getElementById('mat').value.trim(), newFloor=document.getElementById('floorSelect').value;
  if((selectedRoom.matricule!==newMat||selectedRoom.floor!==newFloor)&&!await isMatriculeUnique(newMat,newFloor,selectedRoom.id)){ showToast('Matricule existe','error'); return; }
  selectedRoom.categorie=document.getElementById('categorie').value;
  selectedRoom.name=document.getElementById('name').value.trim();
  selectedRoom.matricule=newMat; selectedRoom.floor=newFloor;
  if(pickedX!==null&&pickedY!==null){ selectedRoom.x=pickedX; selectedRoom.y=pickedY; }
  selectedRoom.last_activity=new Date().toLocaleString();
  await updateRoomInDB(selectedRoom);
  for(const img of imagesToDelete) await deleteRoomImage(img.id,img.url);
  for(const f of currentImageFiles){ const url=await uploadImage(f,selectedRoom.id); await addRoomImage(selectedRoom.id,url); }
  showToast('Modifiée','success'); closeModal(); selectedRoom=null; await drawRooms();
}
function fillForm(r){ if(!r) return; document.getElementById('categorie').value=r.categorie||''; document.getElementById('name').value=r.name||''; document.getElementById('mat').value=r.matricule||''; document.getElementById('coord').value=(r.x&&r.y)?r.x+','+r.y:''; document.getElementById('last_activity').value=r.last_activity||''; pickedX=r.x; pickedY=r.y; }
function clearForm(){ document.getElementById('categorie').value=''; document.getElementById('name').value=''; document.getElementById('mat').value=''; document.getElementById('coord').value=''; }
function closeModal(){ document.getElementById('modal').style.display='none'; deactivatePickMode(); pickedX=pickedY=null; clearImages(); }
function startPick(){ closeModal(); activatePickMode(); showToast('Cliquez sur la carte','success'); }
function activatePickMode(){ picking=true; document.getElementById('map').classList.add('picking-mode'); if(document.querySelector('.leaflet-container')) document.querySelector('.leaflet-container').style.cursor='crosshair'; }
function deactivatePickMode(){ picking=false; document.getElementById('map').classList.remove('picking-mode'); if(document.querySelector('.leaflet-container')) document.querySelector('.leaflet-container').style.cursor=''; }
function togglePanel(){ const p=document.getElementById('sidePanel'); p.classList.toggle('collapsed'); const icon=p.querySelector('.toggle-panel i'); const btn=document.getElementById('showPanelBtn'); if(p.classList.contains('collapsed')){ icon.classList.remove('fa-chevron-left'); icon.classList.add('fa-chevron-right'); btn.style.display='flex'; }else{ icon.classList.remove('fa-chevron-right'); icon.classList.add('fa-chevron-left'); btn.style.display='none'; } }
function showPanel(){ const p=document.getElementById('sidePanel'); p.classList.remove('collapsed'); p.querySelector('.toggle-panel i').classList.remove('fa-chevron-right'); p.querySelector('.toggle-panel i').classList.add('fa-chevron-left'); document.getElementById('showPanelBtn').style.display='none'; }
function openLightbox(urls,idx){ currentGalleryImages=urls; currentGalleryIndex=idx; document.getElementById('lightbox-img').src=urls[idx]; document.getElementById('lightbox-counter').innerText=`${idx+1}/${urls.length}`; document.getElementById('lightbox').style.display='flex'; }
function closeLightbox(){ document.getElementById('lightbox').style.display='none'; }
// Events
document.getElementById('loginBtn').onclick=()=>document.getElementById('loginModal').style.display='flex';
document.getElementById('doLoginBtn').onclick=async()=>{ try{ const u=document.getElementById('loginUsername').value.trim(); const p=document.getElementById('loginPassword').value.trim(); const s=await login(u,p); currentSession=s; updateUI(); document.getElementById('loginModal').style.display='none'; showToast(`Bonjour ${s.username}`,'success'); }catch(e){ document.getElementById('loginError').innerText=e.message; } };
document.getElementById('logoutBtn').onclick=()=>{ logout(); showToast('Déconnecté','success'); };
document.getElementById('createUserBtn').onclick=createNewUser;
document.getElementById('floorSelectBox').onchange=e=>changeFloor(e.target.value);
document.getElementById('search').oninput=async(e)=>{ const val=e.target.value.toLowerCase().trim(); if(!val) return; const {data:all}=await supabaseClient.from('rooms').select('*'); const found=all.find(r=>(r.name&&r.name.toLowerCase().includes(val))||(r.matricule&&r.matricule.toLowerCase().includes(val))); if(!found){ showToast('Non trouvé','error'); return; } if(found.floor===currentFloor){ map.setView([found.y,found.x],2); const m=currentMarkers.find(mk=>Math.abs(mk.getLatLng().lat-found.y)<1&&Math.abs(mk.getLatLng().lng-found.x)<1); if(m) m.openPopup(); showToast(found.name,'success'); }else{ showToast(`Salle au ${found.floor==='1'?'1er':'RDC'}`,'error'); } };
window.onclick=e=>{ if(e.target===document.getElementById('loginModal')) document.getElementById('loginModal').style.display='none'; if(e.target===document.getElementById('userMgmtModal')) document.getElementById('userMgmtModal').style.display='none'; if(e.target===document.getElementById('lightbox')) closeLightbox(); };
document.querySelector('.close-lightbox')?.addEventListener('click',closeLightbox);
document.querySelector('.prev')?.addEventListener('click',()=>{ if(currentGalleryImages.length){ currentGalleryIndex=(currentGalleryIndex-1+currentGalleryImages.length)%currentGalleryImages.length; document.getElementById('lightbox-img').src=currentGalleryImages[currentGalleryIndex]; document.getElementById('lightbox-counter').innerText=`${currentGalleryIndex+1}/${currentGalleryImages.length}`; } });
document.querySelector('.next')?.addEventListener('click',()=>{ if(currentGalleryImages.length){ currentGalleryIndex=(currentGalleryIndex+1)%currentGalleryImages.length; document.getElementById('lightbox-img').src=currentGalleryImages[currentGalleryIndex]; document.getElementById('lightbox-counter').innerText=`${currentGalleryIndex+1}/${currentGalleryImages.length}`; } });
// Initialisation
(async()=>{
  const saved=localStorage.getItem('selectedFloor'); if(saved==='1'||saved==='rdc') currentFloor=saved;
  document.getElementById('floorSelectBox').value=currentFloor;
  await loadSession();
  supabaseClient.channel('rooms').on('postgres_changes',{event:'*',schema:'public',table:'rooms'},()=>drawRooms()).subscribe();
  supabaseClient.channel('images').on('postgres_changes',{event:'*',schema:'public',table:'room_images'},()=>drawRooms()).subscribe();
  await initSampleData();
  initMap();
  setupImageInput();
  await drawRooms();
  showToast('Application prête','success');
})();
</script>
</body>
