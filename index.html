<script>
// ============ CONFIGURATION SUPABASE ============
const SUPABASE_URL = 'https://mtzebyldjggbgbupkudh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10emVieWxkamdnYmdidXBrdWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjUxNjIsImV4cCI6MjA5MDc0MTE2Mn0.9Gk2GuHtSKOff5PuIlTd_ZlUjLUPvO3R3g0vHjh6RKg';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============ VARIABLES GLOBALES ============
let currentSession = null;     // { user, role, username }
let map = null;
let picking = false;
let pickedX = null, pickedY = null;
let selectedRoom = null;
let currentMarkers = [];
let currentImageFiles = [];
let existingImages = [];
let imagesToDelete = [];
let currentGalleryImages = [];
let currentGalleryIndex = 0;
let currentFloor = '1'; // '1' pour floor1, 'rdc' pour floor_rdc

const CATEGORIES = [
  { value: 'salon et séjour', label: 'salon et séjour', icon: '🏠', color: '#ff4d4d' },
  { value: 'salle à manger', label: 'salle à manger', icon: '🍽️', color: '#4caf50' },
  { value: 'chambre adulte', label: 'chambre adulte', icon: '🛏️', color: '#ff9800' },
  { value: 'chambre enfant', label: 'chambre enfant', icon: '🧸', color: '#e91e63' },
  { value: 'rangement', label: 'rangement', icon: '📦', color: '#607d8b' },

  { value: 'jardin', label: 'jardin', icon: '🌳', color: '#8bc34a' },
  { value: 'accessoire', label: 'accessoire', icon: '🔧', color: '#9e9e9e' }
];

// ============ FONCTIONS AUTHENTIFICATION ============
async function login(username, password) {
  const email = username + "@app.local";
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });
  if (error) throw new Error(error.message);
  const { data: profile, error: profileError } = await supabaseClient
    .from('profiles')
    .select('username, role')
    .eq('id', data.user.id)
    .single();
  if (profileError) throw new Error("Profil utilisateur introuvable");
  return { user: data.user, username: profile.username, role: profile.role };
}

async function logout() {
  await supabaseClient.auth.signOut();
  currentSession = null;
  updateUIForUser();
  await drawRooms();
}

async function loadCurrentSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    currentSession = null;
    updateUIForUser();
    return;
  }
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('username, role')
    .eq('id', session.user.id)
    .single();
  if (profile) {
    currentSession = {
      user: session.user,
      username: profile.username,
      role: profile.role
    };
  } else {
    currentSession = null;
  }
  updateUIForUser();
}

function updateUIForUser() {
  const loginBtn = document.getElementById("loginBtn");
  const userInfoDiv = document.getElementById("userInfo");
  const userNameSpan = document.getElementById("userName");
  const userRoleSpan = document.getElementById("userRole");
  const adminActions = document.getElementById("adminActions");
  const manageUsersBtn = document.getElementById("manageUsersBtn");

  if (currentSession) {
    loginBtn.style.display = "none";
    userInfoDiv.style.display = "flex";
    userNameSpan.textContent = currentSession.username;
    userRoleSpan.textContent = currentSession.role === 'admin' ? 'Admin' : 'User';
    adminActions.style.display = "flex";
    if (currentSession.role === 'admin') {
      manageUsersBtn.style.display = "block";
    } else {
      manageUsersBtn.style.display = "none";
    }
  } else {
    loginBtn.style.display = "flex";
    userInfoDiv.style.display = "none";
    adminActions.style.display = "none";
  }
  drawRooms();
}

// ============ GESTION DES UTILISATEURS (admin uniquement) ============
async function openUserManagement() {
  if (!currentSession || currentSession.role !== 'admin') return;
  document.getElementById("userMgmtModal").style.display = "flex";
  await refreshUserList();
}

function closeUserManagement() {
  document.getElementById("userMgmtModal").style.display = "none";
  document.getElementById("userMgmtError").innerText = "";
}

async function refreshUserList() {
  const { data, error } = await supabaseClient
    .from('profiles')
    .select('id, username, role');
  if (error) {
    showToast("Erreur chargement utilisateurs", "error");
    return;
  }
  const container = document.getElementById("userList");
  container.innerHTML = "";
  for (const user of data) {
    const div = document.createElement("div");
    div.innerHTML = `<strong>${escapeHtml(user.username)}</strong> (${user.role === 'admin' ? 'Admin' : 'User'})`;
    if (user.username !== currentSession.username) {
      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = async () => {
        if (confirm(`Supprimer ${user.username} ?`)) {
          await deleteUser(user.username);
          await refreshUserList();
        }
      };
      div.appendChild(deleteBtn);
    }
    container.appendChild(div);
  }
}

// ============ SUPPRESSION CORRECTE D'UN UTILISATEUR (auth.users + profiles) ============
async function deleteUser(username) {
  if (!currentSession || currentSession.role !== 'admin') return;
  if (!confirm(`Supprimer ${username} définitivement ?`)) return;
  try {
    const { error } = await supabaseClient.rpc('delete_user_by_username', {
      username_to_delete: username
    });
    if (error) throw new Error(error.message);
    showToast(`Utilisateur ${username} supprimé avec succès`, "success");
  } catch (err) {
    showToast("Erreur suppression : " + err.message, "error");
  }
}

async function createNewUser() {
  const username = document.getElementById("newUsername").value.trim();
  const password = document.getElementById("newPassword").value.trim();
  const role = document.getElementById("newUserRole").value;

  if (!username || !password) {
    document.getElementById("userMgmtError").innerText = "Veuillez remplir tous les champs.";
    return;
  }

  try {
    const { data: existingUser, error: checkError } = await supabaseClient
      .from('profiles')
      .select('username')
      .eq('username', username)
      .maybeSingle();
    if (checkError) throw new Error(checkError.message);
    if (existingUser) {
      document.getElementById("userMgmtError").innerText = "Ce nom d'utilisateur existe déjà.";
      return;
    }

    const email = username + "@app.local";
    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
      email: email,
      password: password,
      options: { data: { username: username } }
    });
    if (signUpError) throw new Error(signUpError.message);
    if (!signUpData.user) throw new Error("Échec de la création de l'utilisateur");

    const { error: profileError } = await supabaseClient
      .from('profiles')
      .insert({ id: signUpData.user.id, username: username, role: role });
    if (profileError) throw new Error(profileError.message);

    showToast(`Utilisateur ${username} créé avec succès`, "success");
    document.getElementById("newUsername").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("userMgmtError").innerText = "";
    await refreshUserList();
  } catch (err) {
    console.error("Erreur complète:", err);
    let errorMsg = err.message;
    if (err.details) errorMsg += " - " + err.details;
    document.getElementById("userMgmtError").innerText = errorMsg;
  }
}

// ============ FONCTIONS DE LA CARTE ET GESTION DES ÉTAGES ============
function initMap() {
  map = L.map('map', { crs: L.CRS.Simple, minZoom: -1, zoomControl: false });
  updateMapFloor(currentFloor);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on("click", function(e) {
    let x = Math.round(e.latlng.lng);
    let y = Math.round(e.latlng.lat);
    if (picking === true) {
      pickedX = x; pickedY = y;
      document.getElementById("coord").value = x + "," + y;
      deactivatePickMode();
      document.getElementById("modal").style.display = "flex";
    }
  });
}

function updateMapFloor(floor) {
  if (!map) return;
  if (map.overlay) map.removeLayer(map.overlay);
  let imageUrl = floor === '1' ? 'floor1.jpg' : 'floor_rdc.jpg';
  let bounds = [[0, 0], [3000, 2669]];
  let overlay = L.imageOverlay(imageUrl, bounds).addTo(map);
  map.overlay = overlay;
  map.fitBounds(bounds);
}

async function changeFloor(floor) {
  currentFloor = floor;
  localStorage.setItem('selectedFloor', floor);
  updateMapFloor(floor);
  await drawRooms();
  const floorSelectBox = document.getElementById("floorSelectBox");
  if (floorSelectBox) floorSelectBox.value = floor;
  showToast(`Changement d'étage : ${floor === '1' ? '1er étage' : 'Rez-de-chaussée'}`, 'success');
}

// ============ CRUD Rooms (avec gestion du floor) ============
const TABLE_NAME = 'rooms';
const IMAGES_TABLE = 'room_images';
const STORAGE_BUCKET = 'room-images';

async function getAllRooms(floor = currentFloor) {
  const { data, error } = await supabaseClient
    .from(TABLE_NAME)
    .select('*')
    .eq('floor', floor)
    .order('id', { ascending: true });
  if (error) throw error;
  return data || [];
}

async function addRoom(room) {
  const { data, error } = await supabaseClient.from(TABLE_NAME).insert([room]).select();
  if (error) throw error;
  return data[0].id;
}

async function updateRoomInDB(room) {
  const { error } = await supabaseClient.from(TABLE_NAME).update({
    categorie: room.categorie, name: room.name, matricule: room.matricule,
    x: room.x, y: room.y, last_activity: room.last_activity, floor: room.floor
  }).eq('id', room.id);
  if (error) throw error;
}

async function deleteRoomById(id) {
  await deleteAllRoomImages(id);
  const { error } = await supabaseClient.from(TABLE_NAME).delete().eq('id', id);
  if (error) throw error;
}

async function isMatriculeUnique(matricule, floor, excludeId = null) {
  let query = supabaseClient.from(TABLE_NAME).select('id').eq('matricule', matricule).eq('floor', floor);
  if (excludeId) query = query.neq('id', excludeId);
  const { data, error } = await query;
  if (error) throw error;
  return data.length === 0;
}

// ============ GESTION DES IMAGES ============
async function uploadImage(file, roomId) {
  if (!file) return null;
  const ext = file.name.split('.').pop();
  const fileName = `${roomId}_${Date.now()}_${Math.random()}.${ext}`;
  const { data, error } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(fileName, file, { cacheControl: '3600', contentType: file.type });
  if (error) throw error;
  const { data: publicUrlData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
  return publicUrlData.publicUrl;
}

async function deleteImageFromStorage(imageUrl) {
  if (!imageUrl) return;
  const urlParts = imageUrl.split('/');
  const fileName = urlParts[urlParts.length - 1];
  if (fileName) await supabaseClient.storage.from(STORAGE_BUCKET).remove([fileName]);
}

async function addRoomImage(roomId, imageUrl) {
  const { error } = await supabaseClient.from(IMAGES_TABLE).insert({ room_id: roomId, image_url: imageUrl });
  if (error) throw error;
}

async function getRoomImages(roomId) {
  const { data, error } = await supabaseClient.from(IMAGES_TABLE).select('*').eq('room_id', roomId).order('id', { ascending: true });
  if (error) throw error;
  return data || [];
}

async function deleteRoomImage(imageId, imageUrl) {
  await supabaseClient.from(IMAGES_TABLE).delete().eq('id', imageId);
  await deleteImageFromStorage(imageUrl);
}

async function deleteAllRoomImages(roomId) {
  const images = await getRoomImages(roomId);
  for (const img of images) {
    await deleteImageFromStorage(img.image_url);
  }
  await supabaseClient.from(IMAGES_TABLE).delete().eq('room_id', roomId);
}

// ============ FONCTIONS D'AFFICHAGE CARTE ============
async function deleteFromPopup(roomId) {
  if (!currentSession) {
    showToast("Vous devez être connecté pour supprimer", "error");
    return;
  }
  if (!confirm("Êtes-vous sûr de vouloir supprimer cette salle ?")) return;
  try {
    await deleteRoomById(roomId);
    showToast("Salle supprimée avec succès", "success");
    if (map) map.closePopup();
    await drawRooms();
  } catch(e) {
    showToast("Erreur lors de la suppression : " + e.message, "error");
  }
}

function createPopupContent(room, catInfo, images) {
  let imagesHtml = '';
  if (images && images.length > 0) {
    const imageUrls = images.map(img => img.image_url);
    const displayImages = images.slice(0, 3);
    const moreCount = images.length - 3;
    imagesHtml = `<div style="display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap;">`;
    displayImages.forEach((img, idx) => {
      imagesHtml += `<img src="${img.image_url}" class="popup-gallery-img" data-image-urls='${JSON.stringify(imageUrls)}' data-index="${idx}" style="width:60px; height:60px; object-fit:cover; border-radius:6px; border:1px solid #ddd; cursor:pointer;">`;
    });
    if (moreCount > 0) {
      imagesHtml += `<div class="popup-gallery-more" data-image-urls='${JSON.stringify(imageUrls)}' data-index="3" style="width:60px; height:60px; background:#eee; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer;">+${moreCount}</div>`;
    }
    imagesHtml += `</div>`;
  }
  let buttonsHtml = '';
  if (currentSession) {
    buttonsHtml = `
      <hr style="margin:10px 0">
      <button class="edit-btn" data-id="${room.id}" style="background:linear-gradient(135deg,#ff4d4d,#cc0000);color:white;border:none;border-radius:40px;padding:8px;width:100%;cursor:pointer;margin-bottom:8px;">
        ✏️ Modifier
      </button>
      <button class="delete-popup-btn" data-id="${room.id}" style="background:linear-gradient(135deg,#eb3349,#f45c43);color:white;border:none;border-radius:40px;padding:8px;width:100%;cursor:pointer;">
        🗑️ Supprimer
      </button>
    `;
  }
  return `<div style="min-width:200px;">
    ${imagesHtml}
    <div style="border-bottom:2px solid ${catInfo.color};color:${catInfo.color};display:flex;gap:8px;align-items:center;padding-bottom:6px;">
      <span>${catInfo.icon}</span>
      <strong>${escapeHtml(room.categorie || 'Sans catégorie')}</strong>
    </div>
    <div><i class="fas fa-door-open"></i> <strong>Nom:</strong> ${escapeHtml(room.name)}</div>
    <div><i class="fas fa-id-card"></i> <strong>Matricule:</strong> ${escapeHtml(room.matricule)}</div>
    <div><i class="fas fa-clock"></i> <strong>Activité:</strong> ${escapeHtml(room.last_activity || '')}</div>
    ${buttonsHtml}
  </div>`;
}

async function drawRooms() {
  if (!map) return;
  currentMarkers.forEach(m => map.removeLayer(m));
  currentMarkers = [];
  const rooms = await getAllRooms(currentFloor);
  for (const room of rooms) {
    if (room.x && room.y) {
      const catInfo = CATEGORIES.find(c => c.value === room.categorie) || { icon: '📍', color: '#ff4d4d' };
      const images = await getRoomImages(room.id);
      const marker = L.circle([room.y, room.x], {
        radius: 12,
        color: catInfo.color,
        fillColor: catInfo.color,
        fillOpacity: 0.8,
        weight: 3
      }).addTo(map);
      marker.bindPopup(createPopupContent(room, catInfo, images), { maxWidth: 260 });
      marker.on("click", () => { selectedRoom = room; });
      marker.on("popupopen", (e) => {
        const popup = e.popup.getElement();
        const galleryImgs = popup.querySelectorAll('.popup-gallery-img, .popup-gallery-more');
        galleryImgs.forEach(el => {
          el.addEventListener('click', (event) => {
            event.stopPropagation();
            const imageUrls = JSON.parse(el.getAttribute('data-image-urls'));
            const index = parseInt(el.getAttribute('data-index')) || 0;
            openLightbox(imageUrls, index);
          });
        });
        if (currentSession) {
          const editBtn = popup.querySelector(".edit-btn");
          if (editBtn) editBtn.addEventListener("click", () => editRoomById(editBtn.getAttribute("data-id")));
          const deleteBtn = popup.querySelector(".delete-popup-btn");
          if (deleteBtn) deleteBtn.addEventListener("click", () => deleteFromPopup(deleteBtn.getAttribute("data-id")));
        }
      });
      currentMarkers.push(marker);
    }
  }
  updateStats(rooms);
  updateCategoriesList(rooms);
}

async function updateStats(rooms) {
  const cats = new Set(rooms.map(r => r.categorie).filter(c => c));
  document.getElementById('roomCount').innerText = rooms.length;
  document.getElementById('categoryCount').innerText = cats.size;
}

let expandedCategories = new Set();
function updateCategoriesList(rooms) {
  const container = document.getElementById('categoriesList');
  if (!rooms.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">Aucune salle pour cet étage</div>'; return; }
  const byCat = new Map();
  rooms.forEach(room => {
    const cat = room.categorie || 'sans-categorie';
    if (!byCat.has(cat)) byCat.set(cat, []);
    byCat.get(cat).push(room);
  });
  const sortedCategories = Array.from(byCat.keys()).sort();
  let html = '';
  for (let cat of sortedCategories) {
    const roomsList = byCat.get(cat);
    const catInfo = CATEGORIES.find(c => c.value === cat) || { value: cat, label: cat, icon: '🏷️', color: '#9e9e9e' };
    const isExpanded = expandedCategories.has(cat);
    html += generateCatHTML(cat, catInfo.icon, catInfo.label, roomsList, isExpanded, cat === 'sans-categorie');
  }
  container.innerHTML = html;
  attachCategoryEvents();
}

function generateCatHTML(catValue, icon, label, roomsList, isExpanded, isUncategorized = false) {
  const expandedClass = isExpanded ? 'expanded' : '';
  const rotatedClass = isExpanded ? 'rotated' : '';
  const displayLabel = isUncategorized ? 'Sans catégorie' : label;
  const displayIcon = isUncategorized ? '📋' : icon;
  return `<div class="category-group" data-cat="${catValue}">
    <div class="category-header">
      <div class="category-name">
        <i class="fas ${isUncategorized ? 'fa-folder-open' : 'fa-folder'}"></i>
        <span>${displayIcon} ${escapeHtml(displayLabel)}</span>
        <span class="category-count">${roomsList.length}</span>
      </div>
      <i class="fas fa-chevron-right toggle-icon ${rotatedClass}"></i>
    </div>
    <div class="category-rooms ${expandedClass}">
      ${roomsList.map(room => `
        <div class="room-item" data-room-id="${room.id}" data-room-x="${room.x}" data-room-y="${room.y}" data-room-name="${escapeHtml(room.name)}" data-room-mat="${escapeHtml(room.matricule)}">
          <div class="room-name"><i class="fas fa-door-open"></i> ${escapeHtml(room.name)}</div>
          <div class="room-mat">${escapeHtml(room.matricule)}</div>
          <div class="room-cat">${room.last_activity ? new Date(room.last_activity).toLocaleDateString() : ''}</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function attachRoomItemEvents() {
  document.querySelectorAll('.room-item').forEach(item => {
    item.removeEventListener('click', item._clickHandler);
    const handler = (e) => {
      e.stopPropagation();
      const roomId = parseInt(item.getAttribute('data-room-id'));
      const x = parseFloat(item.getAttribute('data-room-x'));
      const y = parseFloat(item.getAttribute('data-room-y'));
      const name = item.getAttribute('data-room-name');
      if (isNaN(x) || isNaN(y)) { showToast("Cette salle n'a pas de position valide", "error"); return; }
      if (map) {
        map.flyTo([y, x], 2, { duration: 0.8 });
        setTimeout(() => {
          const marker = currentMarkers.find(m => {
            const latlng = m.getLatLng();
            return Math.abs(latlng.lat - y) < 5 && Math.abs(latlng.lng - x) < 5;
          });
          if (marker) marker.openPopup();
          showToast(`📍 ${name}`, 'success');
        }, 800);
      }
      selectedRoom = { id: roomId, x, y, name };
    };
    item.addEventListener('click', handler);
    item._clickHandler = handler;
  });
}

function attachCategoryEvents() {
  document.querySelectorAll('.category-group').forEach(group => {
    const header = group.querySelector('.category-header');
    if (!header) return;
    const newHeader = header.cloneNode(true);
    header.parentNode.replaceChild(newHeader, header);
    const finalHeader = newHeader;
    finalHeader.addEventListener('click', (e) => {
      const catValue = group.getAttribute('data-cat');
      const roomsDiv = group.querySelector('.category-rooms');
      const icon = finalHeader.querySelector('.toggle-icon');
      if (roomsDiv.classList.contains('expanded')) {
        roomsDiv.classList.remove('expanded');
        icon.classList.remove('rotated');
        expandedCategories.delete(catValue);
      } else {
        roomsDiv.classList.add('expanded');
        icon.classList.add('rotated');
        expandedCategories.add(catValue);
      }
      setTimeout(() => attachRoomItemEvents(), 50);
    });
  });
  attachRoomItemEvents();
}

function escapeHtml(t) { if(!t) return ''; return t.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

function showToast(message, type = "success") {
  const existingToast = document.querySelector('.toast');
  if (existingToast) existingToast.remove();
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
  document.body.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

// ============ GESTION DES IMAGES DANS LE MODAL ============
function setupImageInput() {
  const input = document.getElementById('imageInput');
  input.onchange = (e) => {
    const files = Array.from(e.target.files);
    if (files.length) {
      currentImageFiles.push(...files);
      updateImagePreview();
    }
    input.value = '';
  };
}

function updateImagePreview() {
  const container = document.getElementById('imagePreviewContainer');
  container.innerHTML = '';
  currentImageFiles.forEach((file, index) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const div = document.createElement('div');
      div.className = 'image-item';
      div.innerHTML = `<img src="${ev.target.result}" style="width:80px; height:80px; object-fit:cover; border-radius:8px;"><button type="button" class="delete-img-btn" data-index="${index}">🗑️</button>`;
      div.querySelector('.delete-img-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        currentImageFiles.splice(index, 1);
        updateImagePreview();
      });
      container.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
  if (existingImages.length > 0) {
    existingImages.forEach((img, idx) => {
      const div = document.createElement('div');
      div.className = 'image-item';
      div.innerHTML = `<img src="${img.image_url}" style="width:80px; height:80px; object-fit:cover; border-radius:8px;"><button type="button" class="delete-existing-img-btn" data-id="${img.id}" data-url="${img.image_url}">🗑️</button>`;
      div.querySelector('.delete-existing-img-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const imageId = parseInt(e.target.getAttribute('data-id'));
        const imageUrl = e.target.getAttribute('data-url');
        imagesToDelete.push({ id: imageId, url: imageUrl });
        existingImages = existingImages.filter(img => img.id !== imageId);
        updateImagePreview();
      });
      container.appendChild(div);
    });
  }
}

function clearImages() {
  currentImageFiles = [];
  existingImages = [];
  imagesToDelete = [];
  document.getElementById('imageInput').value = '';
  document.getElementById('imagePreviewContainer').innerHTML = '';
}

// ============ MODALES (ajout d'un champ floor) ============
function openModal(type) {
  if (!currentSession) {
    showToast("Vous devez être connecté pour ajouter/modifier", "error");
    return;
  }
  deactivatePickMode();
  document.getElementById("modal").style.display = "flex";
  const actions = document.getElementById("actions");
  const title = document.getElementById("title");
  const now = new Date().toLocaleString();
  
  let floorSelect = document.getElementById("floorSelect");
  if (!floorSelect) {
    const coordRow = document.querySelector(".coord-row");
    const div = document.createElement("div");
    div.innerHTML = `
      <label style="font-weight:bold; display:block; margin-bottom:6px;"><i class="fas fa-building"></i> Étage :</label>
      <select id="floorSelect" style="width:100%; padding:12px; border-radius:16px; border:2px solid #e2e8f0;">
        <option value="1">1er étage</option>
        <option value="rdc">Rez-de-chaussée (RDC)</option>
      </select>
    `;
    coordRow.parentNode.insertBefore(div, coordRow);
  }
  
  if (type === "add") {
    title.innerHTML = '<i class="fas fa-plus"></i> Ajouter une salle';
    actions.innerHTML = `<button onclick="saveRoom()"><i class="fas fa-save"></i> Enregistrer</button><button onclick="closeModal()">Annuler</button>`;
    document.getElementById("last_activity").value = now;
    selectedRoom = null; pickedX = null; pickedY = null;
    clearForm();
    clearImages();
    document.getElementById("floorSelect").value = currentFloor;
  }
}

function validateFormFields() {
  if(!document.getElementById("categorie").value) { showToast("Choisissez une catégorie","error"); return false; }
  if(!document.getElementById("name").value.trim()) { showToast("Nom requis","error"); return false; }
  if(!document.getElementById("mat").value.trim()) { showToast("Matricule requis","error"); return false; }
  if(!document.getElementById("coord").value) { showToast("Position sur la carte requise","error"); return false; }
  return true;
}

async function saveRoom() {
  if(!validateFormFields()) return;
  if(pickedX === null || pickedY === null) { showToast("Sélectionnez un emplacement","error"); return; }
  const newMat = document.getElementById("mat").value.trim();
  const floor = document.getElementById("floorSelect").value;
  if(!await isMatriculeUnique(newMat, floor)) { showToast("Matricule existe déjà pour cet étage","error"); return; }
  const newRoom = {
    categorie: document.getElementById("categorie").value,
    name: document.getElementById("name").value.trim(),
    matricule: newMat,
    x: pickedX,
    y: pickedY,
    last_activity: new Date().toLocaleString(),
    floor: floor
  };
  try {
    const roomId = await addRoom(newRoom);
    for (const file of currentImageFiles) {
      const imageUrl = await uploadImage(file, roomId);
      await addRoomImage(roomId, imageUrl);
    }
    showToast("Salle ajoutée avec succès","success");
    closeModal();
    await drawRooms();
    clearForm();
    pickedX = null; pickedY = null;
    clearImages();
  } catch(e) {
    showToast("Erreur: " + e.message,"error");
  }
}

async function editRoomById(id) {
  if (!currentSession) { showToast("Vous devez être connecté pour modifier", "error"); return; }
  const { data: room, error } = await supabaseClient
    .from('rooms')
    .select('*')
    .eq('id', id)
    .single();
  if (error || !room) {
    showToast("Salle non trouvée", "error");
    return;
  }
  selectedRoom = room;
  openEditModal();
}

async function openEditModal() {
  deactivatePickMode();
  if (!selectedRoom) { showToast("Erreur: aucune salle sélectionnée", "error"); return; }
  fillForm(selectedRoom);
  existingImages = await getRoomImages(selectedRoom.id);
  currentImageFiles = [];
  imagesToDelete = [];
  updateImagePreview();
  let floorSelect = document.getElementById("floorSelect");
  if (!floorSelect) {
    const coordRow = document.querySelector(".coord-row");
    const div = document.createElement("div");
    div.innerHTML = `
      <label style="font-weight:bold; display:block; margin-bottom:6px;"><i class="fas fa-building"></i> Étage :</label>
      <select id="floorSelect" style="width:100%; padding:12px; border-radius:16px; border:2px solid #e2e8f0;">
        <option value="1">1er étage</option>
        <option value="rdc">Rez-de-chaussée (RDC)</option>
      </select>
    `;
    coordRow.parentNode.insertBefore(div, coordRow);
  }
  document.getElementById("floorSelect").value = selectedRoom.floor || '1';
  document.getElementById("modal").style.display = "flex";
  document.getElementById("title").innerHTML = '<i class="fas fa-edit"></i> Modifier la salle';
  document.getElementById("actions").innerHTML = `<button onclick="updateRoom()" style="background:linear-gradient(135deg,#ff4d4d,#cc0000);color:white">Mettre à jour</button><button onclick="closeModal()">Annuler</button>`;
  pickedX = selectedRoom.x;
  pickedY = selectedRoom.y;
}

async function updateRoom() {
  if (!selectedRoom) return;
  if (!validateFormFields()) return;
  const newMat = document.getElementById("mat").value.trim();
  const newFloor = document.getElementById("floorSelect").value;
  if ((selectedRoom.matricule !== newMat || selectedRoom.floor !== newFloor) && !await isMatriculeUnique(newMat, newFloor, selectedRoom.id)) {
    showToast("Matricule déjà utilisé pour cet étage", "error");
    return;
  }
  selectedRoom.categorie = document.getElementById("categorie").value;
  selectedRoom.name = document.getElementById("name").value.trim();
  selectedRoom.matricule = newMat;
  selectedRoom.floor = newFloor;
  if (pickedX !== null && pickedY !== null) { selectedRoom.x = pickedX; selectedRoom.y = pickedY; }
  selectedRoom.last_activity = new Date().toLocaleString();
  try {
    await updateRoomInDB(selectedRoom);
    for (const img of imagesToDelete) { await deleteRoomImage(img.id, img.url); }
    for (const file of currentImageFiles) {
      const imageUrl = await uploadImage(file, selectedRoom.id);
      await addRoomImage(selectedRoom.id, imageUrl);
    }
    showToast("Mise à jour réussie","success");
    closeModal();
    selectedRoom = null;
    await drawRooms();
  } catch(e) {
    showToast("Erreur: " + e.message,"error");
  }
}

function fillForm(room) {
  if (!room) return;
  document.getElementById("categorie").value = room.categorie || "";
  document.getElementById("name").value = room.name || "";
  document.getElementById("mat").value = room.matricule || "";
  document.getElementById("coord").value = (room.x && room.y) ? room.x + "," + room.y : "";
  document.getElementById("last_activity").value = room.last_activity || "";
  pickedX = room.x; pickedY = room.y;
  if (document.getElementById("floorSelect")) document.getElementById("floorSelect").value = room.floor || '1';
}

function clearForm() {
  document.getElementById("categorie").value = "";
  document.getElementById("name").value = "";
  document.getElementById("mat").value = "";
  document.getElementById("coord").value = "";
  document.getElementById("last_activity").value = "";
}

function closeModal() { 
  document.getElementById("modal").style.display="none"; 
  deactivatePickMode(); 
  pickedX=null; pickedY=null;
  clearImages();
}
function startPick() { closeModal(); activatePickMode(); showToast("Cliquez sur la carte", "success"); }
function activatePickMode() { picking=true; document.getElementById('map').classList.add('picking-mode'); const lc=document.querySelector('.leaflet-container'); if(lc) lc.style.cursor='crosshair'; }
function deactivatePickMode() { picking=false; document.getElementById('map').classList.remove('picking-mode'); const lc=document.querySelector('.leaflet-container'); if(lc) lc.style.cursor=''; }
function togglePanel() { const panel=document.getElementById('sidePanel'); const showBtn=document.getElementById('showPanelBtn'); panel.classList.toggle('collapsed'); const icon=panel.querySelector('.toggle-panel i'); if(panel.classList.contains('collapsed')) { icon.classList.remove('fa-chevron-left'); icon.classList.add('fa-chevron-right'); showBtn.style.display='flex'; } else { icon.classList.remove('fa-chevron-right'); icon.classList.add('fa-chevron-left'); showBtn.style.display='none'; } }
function showPanel() { const panel=document.getElementById('sidePanel'); panel.classList.remove('collapsed'); const icon=panel.querySelector('.toggle-panel i'); icon.classList.remove('fa-chevron-right'); icon.classList.add('fa-chevron-left'); document.getElementById('showPanelBtn').style.display='none'; }

// Lightbox
function openLightbox(imageUrls, startIndex) {
  if (!imageUrls || imageUrls.length === 0) return;
  currentGalleryImages = imageUrls;
  currentGalleryIndex = startIndex;
  updateLightboxImage();
  document.getElementById('lightbox').classList.add('active');
}
function updateLightboxImage() {
  const imgElement = document.getElementById('lightbox-img');
  const counter = document.getElementById('lightbox-counter');
  if (currentGalleryImages.length > 0) {
    imgElement.src = currentGalleryImages[currentGalleryIndex];
    counter.textContent = `${currentGalleryIndex+1} / ${currentGalleryImages.length}`;
  }
}
function nextImage() { if (currentGalleryImages.length) { currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryImages.length; updateLightboxImage(); } }
function prevImage() { if (currentGalleryImages.length) { currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length; updateLightboxImage(); } }
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); currentGalleryImages = []; }

// ============ ÉVÉNEMENTS ============
document.getElementById("loginBtn").addEventListener("click", () => { document.getElementById("loginModal").style.display = "flex"; });
document.getElementById("doLoginBtn").addEventListener("click", async () => {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  try {
    const session = await login(username, password);
    currentSession = session;
    updateUIForUser();
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("loginError").innerText = "";
    document.getElementById("loginUsername").value = "";
    document.getElementById("loginPassword").value = "";
    showToast(`Bienvenue ${session.username} (${session.role})`, "success");
  } catch (err) {
    document.getElementById("loginError").innerText = err.message;
  }
});
document.getElementById("logoutBtn").addEventListener("click", () => { logout(); showToast("Déconnecté", "success"); });

window.onclick = function(event) {
  const loginModal = document.getElementById("loginModal");
  const userMgmtModal = document.getElementById("userMgmtModal");
  if (event.target === loginModal) loginModal.style.display = "none";
  if (event.target === userMgmtModal) userMgmtModal.style.display = "none";
}
document.getElementById("createUserBtn").addEventListener("click", createNewUser);

const floorSelectBox = document.getElementById("floorSelectBox");
if (floorSelectBox) {
  floorSelectBox.addEventListener("change", (e) => changeFloor(e.target.value));
}

document.getElementById("search").addEventListener("input", async (e) => {
  const val = e.target.value.toLowerCase().trim();
  if (val === "") return;
  const { data: allRooms, error } = await supabaseClient
    .from('rooms')
    .select('*');
  if (error) {
    showToast("Erreur de recherche", "error");
    return;
  }
  const foundRoom = allRooms.find(r =>
    (r.name && r.name.toLowerCase().includes(val)) ||
    (r.matricule && r.matricule.toLowerCase().includes(val)) ||
    (r.categorie && r.categorie.toLowerCase().includes(val))
  );
  if (!foundRoom) {
    showToast("Aucune salle trouvée", "error");
    return;
  }
  if (foundRoom.floor === currentFloor) {
    map.setView([foundRoom.y, foundRoom.x], 2);
    const marker = currentMarkers.find(m => {
      const latlng = m.getLatLng();
      return Math.abs(latlng.lat - foundRoom.y) < 1 && Math.abs(latlng.lng - foundRoom.x) < 1;
    });
    if (marker) marker.openPopup();
    showToast(`Trouvé: ${foundRoom.name} (${foundRoom.matricule})`, "success");
  } else {
    const floorName = foundRoom.floor === '1' ? '1er étage' : 'Rez-de-chaussée';
    showToast(`La salle "${foundRoom.name}" se trouve au ${floorName}. Changez d'étage pour la voir.`, "error");
  }
});

// ============ INITIALISATION ============
(async function init() {
  // Restaurer l'étage sauvegardé
  const savedFloor = localStorage.getItem('selectedFloor');
  if (savedFloor && (savedFloor === '1' || savedFloor === 'rdc')) {
    currentFloor = savedFloor;
  } else {
    currentFloor = '1';
  }
  const floorSelectBoxInit = document.getElementById("floorSelectBox");
  if (floorSelectBoxInit) floorSelectBoxInit.value = currentFloor;

  await loadCurrentSession();
  supabaseClient.channel('rooms-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rooms' }, () => drawRooms())
    .subscribe();
  supabaseClient.channel('images-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'room_images' }, () => drawRooms())
    .subscribe();
  try {
    await initSampleData();
    initMap();
    setupImageInput();
    await drawRooms();
    showToast("Système prêt - Gestion multi-étages", "success");

    const lightbox = document.getElementById('lightbox');
    lightbox.querySelector('.close-lightbox').addEventListener('click', closeLightbox);
    lightbox.querySelector('.prev').addEventListener('click', prevImage);
    lightbox.querySelector('.next').addEventListener('click', nextImage);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'Escape') closeLightbox();
    });
  } catch (error) {
    console.error(error);
    showToast("Erreur de connexion à Supabase", "error");
  }
})();
</script>
