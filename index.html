<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Indoor Map PRO - Full Optimized</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body{margin:0;font-family:Arial}
#map{height:100vh}
.topbar{position:absolute;top:10px;left:10px;right:10px;z-index:1000;display:flex;gap:10px}
input{padding:8px;border-radius:8px;border:1px solid #ccc}
button{padding:8px 14px;border:none;border-radius:8px;background:#ff4d4d;color:white;cursor:pointer}
.panel{position:absolute;left:10px;top:60px;width:260px;background:white;border-radius:12px;padding:10px;z-index:1000;max-height:80vh;overflow:auto}
.room-item{padding:8px;border-bottom:1px solid #eee;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <input id="search" placeholder="Search room...">
  <button onclick="openAdd()">+ Add</button>
</div>

<div class="panel" id="roomList"></div>
<div id="map"></div>

<script>
const SUPABASE_URL = 'https://mtzebyldjggbgbupkudh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10emVieWxkamdnYmdidXBrdWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjUxNjIsImV4cCI6MjA5MDc0MTE2Mn0.9Gk2GuHtSKOff5PuIlTd_ZlUjLUPvO3R3g0vHjh6RKg';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let map;
let markers = [];
let cacheRooms = [];
let currentFloor = '1';

// ================= MAP =================
function initMap(){
  map = L.map('map',{crs:L.CRS.Simple});
  loadFloor();
}

function loadFloor(){
  if(map.overlay) map.removeLayer(map.overlay);
  const img = currentFloor==='1'?'floor1.jpg':'floor_rdc.jpg';
  const bounds=[[0,0],[3000,2669]];
  map.overlay=L.imageOverlay(img,bounds).addTo(map);
  map.fitBounds(bounds);
}

// ================= FETCH OPTIMIZED =================
async function fetchRooms(){
  const {data,error}=await supabaseClient
    .from('rooms')
    .select(`*, room_images(*)`)
    .eq('floor',currentFloor);
  if(error) throw error;
  cacheRooms=data;
}

// ================= DRAW =================
function draw(){
  markers.forEach(m=>{m.off();map.removeLayer(m)});
  markers=[];

  cacheRooms.forEach(r=>{
    if(!r.x||!r.y) return;

    const marker=L.circle([r.y,r.x],{radius:10,color:'#ff4d4d'}).addTo(map);

    const imgs=r.room_images||[];

    marker.bindPopup(`
      <b>${r.name}</b><br>
      ${r.matricule}<br>
      Images:${imgs.length}
      <br><button onclick="deleteRoom('${r.id}')">Delete</button>
    `);

    markers.push(marker);
  });

  renderList();
}

// ================= LIST =================
function renderList(){
  const el=document.getElementById('roomList');
  el.innerHTML='';

  cacheRooms.forEach(r=>{
    const div=document.createElement('div');
    div.className='room-item';
    div.innerText=r.name;
    div.onclick=()=>{
      map.setView([r.y,r.x],2);
    }
    el.appendChild(div);
  });
}

// ================= SEARCH =================
let timeout;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(timeout);
  timeout=setTimeout(()=>search(e.target.value),300);
});

async function search(val){
  if(!val) return draw();

  const {data}=await supabaseClient
    .from('rooms')
    .select('*')
    .or(`name.ilike.%${val}%,matricule.ilike.%${val}%`)
    .limit(10);

  cacheRooms=data;
  draw();
}

// ================= ADD =================
function openAdd(){
  const name=prompt('Name');
  const mat=prompt('Matricule');
  if(!name||!mat) return;

  map.once('click',async e=>{
    const x=Math.round(e.latlng.lng);
    const y=Math.round(e.latlng.lat);

    await supabaseClient.from('rooms').insert({
      name, matricule:mat, x, y, floor:currentFloor
    });

    await reload();
  });
}

// ================= DELETE =================
async function deleteRoom(id){
  if(!confirm('Delete?')) return;
  await supabaseClient.from('rooms').delete().eq('id',id);
  await reload();
}

// ================= IMAGE COMPRESS =================
async function compressImage(file){
  const bitmap=await createImageBitmap(file);
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');

  canvas.width=800;
  canvas.height=(bitmap.height/bitmap.width)*800;

  ctx.drawImage(bitmap,0,0,canvas.width,canvas.height);

  return new Promise(r=>canvas.toBlob(r,'image/jpeg',0.7));
}

// ================= RELOAD =================
async function reload(){
  await fetchRooms();
  draw();
}

// ================= REALTIME =================
supabaseClient.channel('rooms')
  .on('postgres_changes',{event:'*',schema:'public',table:'rooms'},reload)
  .subscribe();

// ================= INIT =================
(async()=>{
  initMap();
  await reload();
})();

</script>
</body>
</html>
