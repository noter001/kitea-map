<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Indoor Map PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial }
#map { height:100vh; width:100% }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= GLOBAL =================
let map = null;
let currentMarkers = [];
let cachedRooms = [];
let selectedRoom = null;

// ================= SUPABASE =================
const SUPABASE_URL = 'https://mtzebyldjggbgbupkudh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10emVieWxkamdnYmdidXBrdWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjUxNjIsImV4cCI6MjA5MDc0MTE2Mn0.9Gk2GuHtSKOff5PuIlTd_ZlUjLUPvO3R3g0vHjh6RKg';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TABLE_NAME = 'rooms';

// ================= CACHE FUNCTION =================
async function getAllRooms(forceRefresh = false) {

  if (!forceRefresh && cachedRooms.length > 0) {
    return cachedRooms;
  }

  const { data, error } = await supabaseClient
    .from(TABLE_NAME)
    .select('*')
    .order('id', { ascending: true });

  if (error) throw error;

  cachedRooms = data || [];
  return cachedRooms;
}

// ================= CRUD =================
async function addRoom(room) {
  await supabaseClient.from(TABLE_NAME).insert([room]);
}

async function deleteRoomById(id) {
  await supabaseClient.from(TABLE_NAME).delete().eq('id', id);
}

async function updateRoomInDB(room) {
  await supabaseClient.from(TABLE_NAME)
    .update(room)
    .eq('id', room.id);
}

// ================= MAP =================
function initMap() {
  map = L.map('map', { crs: L.CRS.Simple });

  let bounds = [[0,0],[3000,2669]];
  L.imageOverlay('floor1.jpg', bounds).addTo(map);
  map.fitBounds(bounds);
}

// ================= DRAW =================
async function drawRooms() {

  currentMarkers.forEach(m => map.removeLayer(m));
  currentMarkers = [];

  const rooms = await getAllRooms();

  rooms.forEach(room => {
    if (room.x && room.y) {

      const marker = L.circle([room.y, room.x], {
        radius: 12,
        color: "blue"
      }).addTo(map);

      marker.on("click", () => {
        selectedRoom = room;
      });

      currentMarkers.push(marker);
    }
  });
}

// ================= ACTIONS =================
async function addSampleRoom() {

  const room = {
    name: "Test",
    matricule: "T-" + Date.now(),
    x: 1000,
    y: 1000
  };

  await addRoom(room);

  cachedRooms = [];
  await drawRooms();
}

async function deleteSelected() {

  if (!selectedRoom) return;

  if (!confirm("Supprimer ?")) return;

  await deleteRoomById(selectedRoom.id);

  cachedRooms = [];
  await drawRooms();
}

async function updateSelected() {

  if (!selectedRoom) return;

  selectedRoom.name = "Updated";

  await updateRoomInDB(selectedRoom); // ✅ FIX BUG

  cachedRooms = [];
  await drawRooms();
}

// ================= REALTIME =================
function enableRealtime() {
  supabaseClient
    .channel('rooms-channel')
    .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'rooms' },
      () => {
        cachedRooms = [];
        drawRooms();
      }
    )
    .subscribe();
}

// ================= INIT =================
(async function () {

  initMap();
  await drawRooms();
  enableRealtime();

})();
</script>

</body>
</html>
