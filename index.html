<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Indoor Map PRO SaaS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
#map{height:100vh;width:100%}
.panel{position:absolute;top:10px;left:10px;background:#111827;padding:15px;border-radius:12px;width:320px;max-height:90vh;overflow:auto}
input,select,button{width:100%;margin-top:8px;padding:8px;border-radius:6px;border:none}
button{background:#2563eb;color:#fff;cursor:pointer}
.room-item{padding:8px;border-bottom:1px solid #1f2937;cursor:pointer}
.room-item:hover{background:#1f2937}
.gallery{display:flex;gap:6px;overflow:auto}
.gallery img{width:80px;height:80px;object-fit:cover;border-radius:6px;cursor:pointer}
.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;display:none;align-items:center;justify-content:center}
.lightbox img{max-width:90%;max-height:90%}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel" id="panel">
<h3>Dashboard</h3>
<input id="search" placeholder="Search room...">
<div id="roomList"></div>

<hr>

<div id="adminSection" style="display:none">
<h4>Add Room</h4>
<input id="name" placeholder="Name">
<input id="category" placeholder="Category">
<input id="x" placeholder="X">
<input id="y" placeholder="Y">
<input type="file" id="images" multiple>
<button onclick="addRoom()">Add</button>

<h4>Users</h4>
<input id="newUser" placeholder="Username">
<input id="newPass" placeholder="Password">
<select id="role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>
<button onclick="createUser()">Create User</button>
<div id="userList"></div>
</div>

<button onclick="logout()">Logout</button>
</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'"><img id="lightImg"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient("YOUR_URL","YOUR_KEY");
let user=null;
let cacheRooms=[];
let markers=[];

const map=L.map('map').setView([0,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function init(){
let session=await supabase.auth.getSession();
user=session.data.session?.user;
if(!user) return location.reload();

let role=await getRole();
if(role==='admin') document.getElementById('adminSection').style.display='block';

loadRooms();
loadUsers();
}

async function getRole(){
let {data}=await supabase.from('users').select('role').eq('id',user.id).single();
return data?.role||'user';
}

async function loadRooms(){
let {data}=await supabase.from('rooms').select('*');
cacheRooms=data;
renderRooms(data);
renderMap(data);
}

function renderRooms(list){
let el=document.getElementById('roomList');
el.innerHTML='';
list.forEach(r=>{
let div=document.createElement('div');
div.className='room-item';
div.innerHTML=`${r.name}<br><small>${r.category}</small>`;
div.onclick=()=>focusRoom(r);
el.appendChild(div);
});
}

function renderMap(list){
markers.forEach(m=>map.removeLayer(m));
markers=[];
list.forEach(r=>{
let m=L.marker([r.x,r.y]).addTo(map).bindPopup(r.name);
markers.push(m);
});
}

function focusRoom(r){
map.setView([r.x,r.y],18);
loadGallery(r.id);
}

async function addRoom(){
let name=document.getElementById('name').value;
let category=document.getElementById('category').value;
let x=document.getElementById('x').value;
let y=document.getElementById('y').value;

let {data,error}=await supabase.from('rooms').insert({name,category,x,y}).select().single();
if(error)return alert(error.message);

let files=document.getElementById('images').files;
for(let f of files){
let path=`${data.id}/${Date.now()}_${f.name}`;
await supabase.storage.from('images').upload(path,f);
await supabase.from('images').insert({room_id:data.id,url:path});
}

loadRooms();
}

async function loadGallery(room_id){
let {data}=await supabase.from('images').select('*').eq('room_id',room_id);
let panel=document.getElementById('panel');
let g=document.createElement('div');
g.className='gallery';

data.forEach(img=>{
let url=supabase.storage.from('images').getPublicUrl(img.url).data.publicUrl;
let i=document.createElement('img');
i.src=url;
i.onclick=()=>openLight(url);
g.appendChild(i);
});

panel.appendChild(g);
}

function openLight(src){
let lb=document.getElementById('lightbox');
document.getElementById('lightImg').src=src;
lb.style.display='flex';
}

async function createUser(){
let u=document.getElementById('newUser').value;
let p=document.getElementById('newPass').value;
let role=document.getElementById('role').value;

let {data,error}=await supabase.auth.signUp({email:u+"@app.com",password:p});
if(error)return alert(error.message);

await supabase.from('users').insert({id:data.user.id,role});
loadUsers();
}

async function loadUsers(){
let {data}=await supabase.from('users').select('*');
let el=document.getElementById('userList');
el.innerHTML='';

data.forEach(u=>{
let d=document.createElement('div');
d.className='room-item';
d.innerHTML=`${u.id} - ${u.role}`;
el.appendChild(d);
});
}

async function logout(){
await supabase.auth.signOut();
location.reload();
}

init();
</script>

</body>
</html>
