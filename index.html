/* ===== LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 20000;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.lightbox.active {
  display: flex;
}
.lightbox img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
.lightbox .nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 40px;
  padding: 15px 20px;
  cursor: pointer;
  border-radius: 50%;
  width: 70px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}
.lightbox .nav-btn:hover {
  background: rgba(0,0,0,0.9);
}
.lightbox .prev {
  left: 20px;
}
.lightbox .next {
  right: 20px;
}
.lightbox .close-lightbox {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 20001;
}
.lightbox .counter {
  position: absolute;
  bottom: 20px;
  left: 0;
  right: 0;
  text-align: center;
  color: white;
  background: rgba(0,0,0,0.6);
  display: inline-block;
  width: auto;
  margin: 0 auto;
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 14px;
  pointer-events: none;
}
@media (max-width: 768px) {
  .lightbox .nav-btn {
    width: 40px;
    height: 40px;
    font-size: 24px;
    padding: 0;
  }
}

/* ===== MODALE LOGIN ===== */
.modal-login {

// ============ GESTION DE L'AUTHENTIFICATION AVEC user_profiles ============
let currentUser = null;
let isAdmin = false;

// التحقق من الجلسة الحالية وجلب صلاحية admin من جدول user_profiles
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    await checkAdminStatus(currentUser.id);
    updateUIForUser();
  }
}

async function checkAdminStatus(userId) {
  try {
    const { data, error } = await supabase
      .from('user_profiles')
      .select('is_admin')
      .eq('id', userId)
      .maybeSingle();
    if (error) throw error;
    isAdmin = data?.is_admin === true;
  } catch (err) {
    console.error('Erreur lecture user_profiles:', err);
    isAdmin = false;
  }
}

async function login(email, password) {
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) throw error;
  currentUser = data.user;
  await checkAdminStatus(currentUser.id);
  updateUIForUser();
  return true;
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  isAdmin = false;
  updateUIForUser();
}

function updateUIForUser() {
  const loginBtn = document.getElementById("loginBtn");
  const userInfoDiv = document.getElementById("userInfo");
  const userEmailSpan = document.getElementById("userEmail");
  const adminActions = document.getElementById("adminActions");
  if (currentUser) {
    loginBtn.style.display = "none";
    userInfoDiv.style.display = "flex";
    userEmailSpan.textContent = currentUser.email;
    adminActions.style.display = isAdmin ? "flex" : "none";
  } else {
    loginBtn.style.display = "flex";
    userInfoDiv.style.display = "none";
    adminActions.style.display = "none";
  }
  // إعادة رسم الخريطة لإظهار/إخفاء أزرار التعديل والحذف في popups
  drawRooms();
}
